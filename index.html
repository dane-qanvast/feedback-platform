<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Compiler</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fafafa' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='22' height='22' x='1' y='1' rx='4' fill='%2318181b' stroke='none'/%3E%3Cpath d='M19 14a1.5 1.5 0 0 1-1.5 1.5H8L5 18.5V6.5A1.5 1.5 0 0 1 6.5 5h11A1.5 1.5 0 0 1 19 6.5z'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #09090b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; border: 2px solid #09090b; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    ::-webkit-scrollbar-corner { background: #09090b; }
    * { scrollbar-width: thin; scrollbar-color: #27272a #09090b; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useEffect } = React;

    // --- Inline SVG icon components ---
    const Icon = ({ children, size = 16, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const Video = (p) => <Icon {...p}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Edit3 = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const MessageSquare = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const PanelRightOpen = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><path d="m8 9 3 3-3 3"/></Icon>;
    const PanelRightClose = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><path d="m11 15-3-3 3-3"/></Icon>;
    const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const FolderUp = (p) => <Icon {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m9 13 3-3 3 3"/></Icon>;
    const FolderDown = (p) => <Icon {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m15 13-3 3-3-3"/></Icon>;
    const MoreHorizontal = (p) => <Icon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>;
    const Trash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;

    // --- Constants ---
    const ANNOTATION_MAX_LENGTH = 200;
    const STORAGE_KEY = 'feedback-platform-data';

    // --- Helpers ---
    const isMediaFile = (f) => f.type.startsWith('image/') || f.type.startsWith('video/');

    const escapeHtml = (str) => str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') : '';

    const readFileAsDataURL = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });

    const buildMediaItem = async (file) => ({
      id: Date.now() + Math.random(),
      name: file.name,
      type: file.type.startsWith('video') ? 'video' : 'image',
      mimeType: file.type,
      dataUrl: await readFileAsDataURL(file),
      annotations: [],
      note: '',
    });

    // --- Export HTML report ---
    const generateExportHTML = (data) => {
      const feedbacksHTML = data.map((fb, fbIdx) => {
        const mediaHTML = fb.media.map((m, mIdx) => {
          const scopeId = `f${fbIdx}-m${mIdx}`;

          const annotationsHTML = m.annotations.map(a => `<div class="annotation-item" id="ann-${scopeId}-${a.number}">
            <div class="annotation-marker">${a.number}</div>
            <div class="annotation-content"><div class="annotation-note">${escapeHtml(a.note)}</div></div>
          </div>`).join('');

          const mediaContent = m.type === 'image'
            ? `<div class="media-wrapper">
                <img src="${m.dataUrl}" alt="${escapeHtml(m.name)}" />
                ${m.annotations.map(a => `<a href="#ann-${scopeId}-${a.number}" class="marker" style="left: ${a.x}%; top: ${a.y}%;">${a.number}<span class="marker-tooltip">${escapeHtml(a.note)}</span></a>`).join('')}
              </div>`
            : `<video controls src="${m.dataUrl}"></video>`;

          const videoNoteHTML = m.type === 'video' && m.note
            ? `<div class="video-note"><h4>Note</h4><p>${escapeHtml(m.note)}</p></div>` : '';

          return `<div class="media-block">
            <div class="media-header">${m.type === 'image' ? '📷' : '🎥'} ${escapeHtml(m.name)}</div>
            ${mediaContent}
            ${videoNoteHTML}
            ${m.type === 'image' && m.annotations.length > 0 ? `<div class="annotations-list">
              <h4>Annotations (${m.annotations.length})</h4>${annotationsHTML}
            </div>` : ''}
          </div>`;
        }).join('');

        return `<div class="feedback-section">
          <div class="feedback-header">
            <h2><span class="feedback-number">${String(fbIdx + 1).padStart(2, '0')}</span>${escapeHtml(fb.title)}</h2>
            <span class="feedback-date">${new Date(fb.createdAt).toLocaleString()}</span>
          </div>
          ${fb.overallNote ? `<div class="overall-note"><h3>Overall Note</h3><p>${escapeHtml(fb.overallNote)}</p></div>` : ''}
          ${mediaHTML || '<p class="empty">No media attached</p>'}
        </div>`;
      }).join('');

      return `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Feedback Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #09090b; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; border: 2px solid #09090b; }
::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
html { scrollbar-width: thin; scrollbar-color: #27272a #09090b; scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e4e4e7; line-height: 1.6; padding: 40px 20px; }
.container { max-width: 1000px; margin: 0 auto; }
.report-header { background: #18181b; color: #fafafa; padding: 40px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #27272a; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
.report-header h1 { font-size: 32px; margin-bottom: 8px; }
.report-header .meta { opacity: 0.6; font-size: 14px; color: #a1a1aa; }
.report-header .safari-tip { margin-top: 16px; padding: 10px 14px; background: rgba(250,250,250,0.05); border: 1px solid #27272a; border-radius: 4px; font-size: 13px; color: #a1a1aa; }
.feedback-section { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.feedback-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #27272a; padding-bottom: 16px; margin-bottom: 20px; }
.feedback-header h2 { font-size: 22px; color: #fafafa; display: flex; align-items: baseline; gap: 12px; }
.feedback-number { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; color: #3f8efc; font-weight: 600; }
.feedback-date { color: #71717a; font-size: 13px; }
.overall-note { background: rgba(250, 250, 250, 0.04); border-left: 4px solid #71717a; padding: 16px 20px; border-radius: 4px; margin-bottom: 24px; }
.overall-note h3 { font-size: 14px; color: #a1a1aa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.overall-note p { color: #e4e4e7; white-space: pre-wrap; }
.media-block { margin-top: 24px; border: 1px solid #27272a; border-radius: 6px; overflow: hidden; background: #0f0f12; }
.media-header { background: #1c1c20; padding: 12px 16px; font-size: 13px; font-weight: 600; color: #a1a1aa; border-bottom: 1px solid #27272a; }
.media-wrapper { position: relative; display: inline-block; max-width: 100%; }
.media-wrapper img, video { max-width: 100%; display: block; height: auto; }
.marker { position: absolute; width: 28px; height: 28px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; transform: translate(-50%, -50%); box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5); border: 2px solid #18181b; text-decoration: none; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
.marker:hover { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 4px 14px rgba(239, 68, 68, 0.7); z-index: 10; }
.marker-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; background: #18181b; color: #e4e4e7; padding: 8px 12px; border-radius: 4px; font-size: 12px; font-weight: normal; line-height: 1.5; white-space: normal; width: max-content; max-width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #3f3f46; opacity: 0; pointer-events: none; transition: opacity 0.15s ease, transform 0.15s ease; transform: translateX(-50%) translateY(4px); text-align: left; }
.marker-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #18181b; }
.marker:hover .marker-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
.annotations-list, .video-note { padding: 20px; background: #1c1c20; border-top: 1px solid #27272a; }
.annotations-list h4, .video-note h4 { font-size: 13px; text-transform: uppercase; color: #71717a; margin-bottom: 12px; letter-spacing: 0.5px; }
.video-note p { color: #e4e4e7; white-space: pre-wrap; }
.annotation-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #27272a; scroll-margin-top: 20px; transition: background 0.4s ease; border-radius: 4px; padding-left: 8px; padding-right: 8px; margin-left: -8px; margin-right: -8px; }
.annotation-item:last-child { border-bottom: none; }
.annotation-item:target { background: rgba(250, 250, 250, 0.08); animation: highlight 1.5s ease; }
@keyframes highlight {
  0% { background: rgba(250, 250, 250, 0.2); }
  100% { background: rgba(250, 250, 250, 0.08); }
}
.annotation-marker { flex-shrink: 0; width: 28px; height: 28px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }
.annotation-content { flex: 1; }
.annotation-note { color: #e4e4e7; white-space: pre-wrap; }
.empty { color: #71717a; font-style: italic; }
</style></head><body>
<div class="container">
<div class="report-header">
  <h1>Feedback Report</h1>
  <div class="meta">Generated ${new Date().toLocaleString()} • ${data.length} feedback item${data.length !== 1 ? 's' : ''}</div>
  <div class="safari-tip">💡 If some videos fail to play in the report, try opening this page in Safari.</div>
</div>
${feedbacksHTML || '<p class="empty">No feedback to display</p>'}
</div></body></html>`;
    };

    const downloadFile = (content, filename, mimeType) => {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    // --- Reusable subcomponents ---
    const DropZone = ({ onClick, onPaste, large = false }) => (
      <div
        onClick={onClick}
        onPaste={onPaste}
        tabIndex={0}
        className={`group cursor-pointer border-2 border-dashed border-zinc-800 hover:border-zinc-500 focus:border-zinc-400 focus:outline-none rounded-lg bg-zinc-900/30 hover:bg-zinc-900/50 transition ${large ? 'p-8' : 'p-10'}`}
      >
        <div className={`mx-auto mb-3 rounded-md bg-zinc-800 group-hover:bg-zinc-700 flex items-center justify-center transition ${large ? 'w-12 h-12' : 'w-14 h-14'}`}>
          <Upload size={large ? 22 : 26} className="text-zinc-300" />
        </div>
        <p className={`font-medium text-zinc-200 mb-1 ${large ? 'text-sm' : 'text-base font-semibold'}`}>
          Drop screenshots or recordings here
        </p>
        <p className="text-xs text-zinc-500">
          or click to browse · paste with <kbd className="px-1.5 py-0.5 bg-zinc-800 rounded text-zinc-400 font-mono text-[10px]">⌘V</kbd>
        </p>
      </div>
    );

    const MediaThumbnail = ({ media, isActive, onClick, onDelete }) => (
      <div
        onClick={onClick}
        className={`group relative rounded cursor-pointer transition overflow-hidden border-2 ${
          isActive ? 'border-[#3f8efc] ring-2 ring-[#3f8efc]/30' : 'border-zinc-800 hover:border-zinc-700'
        }`}
        style={{ aspectRatio: '16 / 9' }}
      >
        {media.type === 'image' ? (
          <img src={media.dataUrl} alt="" className="w-full h-full object-cover" />
        ) : (
          <div className="w-full h-full bg-zinc-950 relative">
            <video src={media.dataUrl} className="w-full h-full object-cover" preload="metadata" muted />
            <div className="absolute inset-0 flex items-center justify-center bg-black/30">
              <div className="w-9 h-9 rounded-full bg-black/60 flex items-center justify-center">
                <Video size={16} className="text-white" />
              </div>
            </div>
          </div>
        )}
        {media.annotations.length > 0 && (
          <div className="absolute top-1.5 left-1.5 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-lg">
            {media.annotations.length}
          </div>
        )}
        <button
          onClick={(e) => { e.stopPropagation(); onDelete(); }}
          className="absolute top-1.5 right-1.5 w-5 h-5 bg-black/60 hover:bg-red-500 rounded-full text-white opacity-0 group-hover:opacity-100 transition flex items-center justify-center"
        >
          <Trash2 size={10} />
        </button>
      </div>
    );

    const VideoErrorCard = ({ media }) => (
      <div className="w-full bg-zinc-900 border-2 border-dashed border-red-500/40 rounded p-6">
        <div className="flex items-start gap-3 mb-4">
          <div className="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center flex-shrink-0">
            <Video size={18} className="text-red-400" />
          </div>
          <div className="flex-1 min-w-0">
            <h3 className="text-base font-semibold text-zinc-100 mb-1">Can't preview this video</h3>
            <div className="text-xs text-zinc-400 space-y-0.5">
              <div className="flex gap-2"><span className="text-zinc-500 w-12 flex-shrink-0">File:</span><span className="text-zinc-300 truncate">{media.name}</span></div>
              <div className="flex gap-2"><span className="text-zinc-500 w-12 flex-shrink-0">Type:</span><span className="text-zinc-300">{media.mimeType || 'unknown'}</span></div>
            </div>
          </div>
        </div>
        <div className="bg-zinc-950 rounded p-4 mb-3">
          <p className="text-xs text-zinc-400 mb-3">
            The video format or codec isn't supported in this browser (common with <code className="text-zinc-300 bg-zinc-900 px-1 rounded">.mov</code> files or HEVC/H.265 from iPhone/macOS recordings). Try one of these to convert to MP4 (H.264):
          </p>
          <ul className="text-xs text-zinc-400 space-y-2">
            <li className="flex gap-2"><span className="text-zinc-300 font-semibold flex-shrink-0">1.</span><span><strong className="text-zinc-200">HandBrake</strong> (free, all platforms) — drop the video in, choose the "Web Optimized" preset, export as MP4</span></li>
            <li className="flex gap-2"><span className="text-zinc-300 font-semibold flex-shrink-0">2.</span><span><strong className="text-zinc-200">CloudConvert</strong> (web-based) — handles .mov → .mp4 (H.264) directly in the browser</span></li>
            <li className="flex gap-2"><span className="text-zinc-300 font-semibold flex-shrink-0">3.</span><span><strong className="text-zinc-200">ffmpeg</strong> (terminal): <code className="text-zinc-300 bg-zinc-900 px-1 rounded">ffmpeg -i input.mov -c:v libx264 -c:a aac output.mp4</code></span></li>
            <li className="flex gap-2"><span className="text-zinc-300 font-semibold flex-shrink-0">4.</span><span><strong className="text-zinc-200">VLC</strong> — Convert/Save → choose H.264 + MP3 (MP4) profile</span></li>
          </ul>
        </div>
        <p className="text-xs text-zinc-500">
          The video is still embedded in the exported HTML report. If some videos fail to play in the report, try opening it in Safari.
        </p>
      </div>
    );

    // --- Main app ---
    function FeedbackPlatform() {
      const loadInitialFeedbacks = () => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return parsed;
          }
        } catch (e) {
          console.warn('Failed to load saved data:', e);
        }
        return [];
      };

      const [feedbacks, setFeedbacks] = useState(loadInitialFeedbacks);
      const [activeFeedbackId, setActiveFeedbackId] = useState(() => {
        const initial = loadInitialFeedbacks();
        return initial[0]?.id || null;
      });
      const [activeMediaId, setActiveMediaId] = useState(() => {
        const initial = loadInitialFeedbacks();
        return initial[0]?.media?.[0]?.id || null;
      });
      const [annotationMode, setAnnotationMode] = useState(false);
      const [currentAnnotation, setCurrentAnnotation] = useState(null);
      const [annotationNote, setAnnotationNote] = useState('');
      const [editingAnnotationId, setEditingAnnotationId] = useState(null);
      const [editingNote, setEditingNote] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [videoError, setVideoError] = useState(false);
      const [showAnnotations, setShowAnnotations] = useState(false);
      const [bottomCollapsed, setBottomCollapsed] = useState(false);
      const [showPreview, setShowPreview] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [storageStatus, setStorageStatus] = useState(null);

      const dragCounter = useRef(0);
      const fileInputRef = useRef(null);
      const importFileRef = useRef(null);
      const imageRef = useRef(null);
      const addFilesRef = useRef(null);
      const menuRef = useRef(null);
      const overallNoteRef = useRef(null);

      const activeFeedback = feedbacks.find(f => f.id === activeFeedbackId);
      const activeMedia = activeFeedback?.media.find(m => m.id === activeMediaId);
      const annotationCount = activeMedia?.annotations?.length || 0;

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(feedbacks));
        } catch (e) {
          if (e.name === 'QuotaExceededError' || e.code === 22) {
            setStorageStatus({
              type: 'error',
              message: 'Storage full — auto-save failed. Export your session to back up your work.'
            });
          }
        }
      }, [feedbacks]);

      useEffect(() => {
        if (storageStatus) {
          const t = setTimeout(() => setStorageStatus(null), 6000);
          return () => clearTimeout(t);
        }
      }, [storageStatus]);

      useEffect(() => {
        if (!showMenu) return;
        const handleClick = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setShowMenu(false);
          }
        };
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, [showMenu]);

      useEffect(() => {
        setVideoError(false);
        setShowAnnotations(false);
      }, [activeMediaId]);

      useEffect(() => {
        if (currentAnnotation) setShowAnnotations(true);
      }, [currentAnnotation]);

      useEffect(() => { addFilesRef.current = addFiles; });

      useEffect(() => {
        const handlePaste = async (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          const clipboardData = e.clipboardData || window.clipboardData;
          if (!clipboardData) return;

          let pastedFiles = [];
          if (clipboardData.files?.length > 0) {
            pastedFiles = Array.from(clipboardData.files).filter(isMediaFile);
          }
          if (pastedFiles.length === 0 && clipboardData.items) {
            pastedFiles = Array.from(clipboardData.items)
              .filter(i => i.kind === 'file' && isMediaFile({ type: i.type }))
              .map(i => i.getAsFile())
              .filter(Boolean);
          }
          if (pastedFiles.length && addFilesRef.current) {
            e.preventDefault();
            await addFilesRef.current(pastedFiles);
          }
        };
        document.addEventListener('paste', handlePaste);
        return () => document.removeEventListener('paste', handlePaste);
      }, []);

      // --- Feedback management ---
      const createFeedback = () => {
        const newFeedback = {
          id: Date.now(),
          title: `Feedback #${feedbacks.length + 1}`,
          overallNote: '',
          media: [],
          createdAt: new Date().toISOString(),
        };
        setFeedbacks([...feedbacks, newFeedback]);
        setActiveFeedbackId(newFeedback.id);
        setActiveMediaId(null);
      };

      const deleteFeedback = (id) => {
        const updated = feedbacks.filter(f => f.id !== id);
        setFeedbacks(updated);
        if (activeFeedbackId === id) {
          setActiveFeedbackId(updated[0]?.id || null);
          setActiveMediaId(null);
        }
      };

      const updateFeedback = (id, updates) => {
        setFeedbacks(feedbacks.map(f => f.id === id ? { ...f, ...updates } : f));
      };

      const updateActiveMedia = (mediaUpdater) => {
        setFeedbacks(feedbacks.map(f =>
          f.id === activeFeedbackId ? { ...f, media: mediaUpdater(f.media) } : f
        ));
      };

      // --- Media management ---
      const addFiles = async (files) => {
        const mediaFiles = files.filter(isMediaFile);
        if (!mediaFiles.length) return;

        let targetFeedbackId = activeFeedbackId;
        let workingFeedbacks = feedbacks;

        if (!targetFeedbackId) {
          const newFeedback = {
            id: Date.now(),
            title: `Feedback #${feedbacks.length + 1}`,
            overallNote: '',
            media: [],
            createdAt: new Date().toISOString(),
          };
          workingFeedbacks = [...feedbacks, newFeedback];
          targetFeedbackId = newFeedback.id;
          setActiveFeedbackId(newFeedback.id);
        }

        const newMedia = await Promise.all(mediaFiles.map(buildMediaItem));
        setFeedbacks(workingFeedbacks.map(f =>
          f.id === targetFeedbackId ? { ...f, media: [...f.media, ...newMedia] } : f
        ));
        if (newMedia.length > 0) setActiveMediaId(newMedia[0].id);
      };

      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length) await addFiles(files);
        e.target.value = '';
      };

      const deleteMedia = (mediaId) => {
        updateActiveMedia(media => media.filter(m => m.id !== mediaId));
        if (activeMediaId === mediaId) setActiveMediaId(null);
      };

      const updateMediaNote = (mediaId, note) => {
        updateActiveMedia(media => media.map(m => m.id === mediaId ? { ...m, note } : m));
      };

      // --- Annotation management ---
      const handleImageClick = (e) => {
        if (!annotationMode || activeMedia?.type !== 'image') return;
        const rect = imageRef.current.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        setCurrentAnnotation({ x, y, type: 'image' });
        setAnnotationNote('');
      };

      const saveAnnotation = () => {
        if (!annotationNote.trim() || !currentAnnotation) return;
        const newAnnotation = {
          id: Date.now(),
          ...currentAnnotation,
          note: annotationNote,
          number: activeMedia.annotations.length + 1,
        };
        updateActiveMedia(media => media.map(m =>
          m.id === activeMediaId ? { ...m, annotations: [...m.annotations, newAnnotation] } : m
        ));
        setCurrentAnnotation(null);
        setAnnotationNote('');
      };

      const deleteAnnotation = (annotationId) => {
        updateActiveMedia(media => media.map(m =>
          m.id === activeMediaId
            ? { ...m, annotations: m.annotations.filter(a => a.id !== annotationId) }
            : m
        ));
      };

      const startEditAnnotation = (annotation) => {
        setEditingAnnotationId(annotation.id);
        setEditingNote(annotation.note);
      };

      const saveEditAnnotation = () => {
        if (!editingNote.trim() || editingAnnotationId == null) return;
        updateActiveMedia(media => media.map(m =>
          m.id === activeMediaId
            ? { ...m, annotations: m.annotations.map(a => a.id === editingAnnotationId ? { ...a, note: editingNote } : a) }
            : m
        ));
        setEditingAnnotationId(null);
        setEditingNote('');
      };

      const cancelEditAnnotation = () => {
        setEditingAnnotationId(null);
        setEditingNote('');
      };

      // --- Drag & drop ---
      const handleDragEnter = (e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current++;
        if (e.dataTransfer.items?.length > 0) setIsDragging(true);
      };

      const handleDragLeave = (e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current--;
        if (dragCounter.current === 0) setIsDragging(false);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };

      const handleDrop = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        dragCounter.current = 0;
        await addFiles(Array.from(e.dataTransfer.files));
      };

      // --- Export ---
      const exportHTML = () => {
        try {
          const html = generateExportHTML(feedbacks);
          downloadFile(html, `feedback-report-${new Date().toISOString().split('T')[0]}.html`, 'text/html;charset=utf-8');
        } catch (err) {
          alert('Export failed: ' + err.message);
        }
      };

      const exportSession = () => {
        try {
          const json = JSON.stringify({
            version: 1,
            exportedAt: new Date().toISOString(),
            feedbacks,
          }, null, 2);
          downloadFile(json, `feedback-session-${new Date().toISOString().split('T')[0]}.json`, 'application/json');
          setShowMenu(false);
        } catch (err) {
          alert('Session export failed: ' + err.message);
        }
      };

      const handleImportSession = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            const importedFeedbacks = Array.isArray(data) ? data : data.feedbacks;
            if (!Array.isArray(importedFeedbacks)) {
              throw new Error('Invalid file format');
            }
            const replace = feedbacks.length === 0 || window.confirm(
              `Import will replace your current ${feedbacks.length} feedback item${feedbacks.length === 1 ? '' : 's'}. Continue?`
            );
            if (replace) {
              setFeedbacks(importedFeedbacks);
              setActiveFeedbackId(importedFeedbacks[0]?.id || null);
              setActiveMediaId(importedFeedbacks[0]?.media?.[0]?.id || null);
              setStorageStatus({
                type: 'success',
                message: `Imported ${importedFeedbacks.length} feedback item${importedFeedbacks.length === 1 ? '' : 's'}`
              });
            }
          } catch (err) {
            alert('Failed to import: ' + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
        setShowMenu(false);
      };

      const clearAllData = () => {
        if (feedbacks.length === 0) {
          setShowMenu(false);
          return;
        }
        if (window.confirm(`Delete all ${feedbacks.length} feedback item${feedbacks.length === 1 ? '' : 's'}? This cannot be undone. Consider exporting your session first.`)) {
          setFeedbacks([]);
          setActiveFeedbackId(null);
          setActiveMediaId(null);
          setStorageStatus({ type: 'success', message: 'All feedback cleared' });
        }
        setShowMenu(false);
      };

      const handleZonePaste = async (e) => {
        const items = Array.from(e.clipboardData?.items || []);
        const files = items.filter(i => i.kind === 'file' && isMediaFile({ type: i.type })).map(i => i.getAsFile()).filter(Boolean);
        if (files.length) await addFiles(files);
      };

      return (
        <div
          className="flex h-screen bg-zinc-950 text-zinc-100 relative"
          onDragEnter={handleDragEnter}
          onDragLeave={handleDragLeave}
          onDragOver={handleDragOver}
          onDrop={handleDrop}
        >
          {/* Drag overlay */}
          {isDragging && (
            <div className="absolute inset-0 z-50 bg-zinc-100/15 backdrop-blur-sm flex items-center justify-center pointer-events-none">
              <div className="bg-zinc-900 rounded-lg shadow-2xl p-10 border-4 border-dashed border-zinc-300">
                <Upload size={56} className="text-zinc-200 mx-auto mb-4" />
                <h2 className="text-2xl font-bold text-zinc-100 mb-1 text-center">Drop your media here</h2>
                <p className="text-zinc-400 text-center">Files will be added to {activeFeedback ? `"${activeFeedback.title}"` : 'a new feedback'}</p>
              </div>
            </div>
          )}

          {/* Storage status toast */}
          {storageStatus && (
            <div className={`absolute bottom-4 right-4 z-50 max-w-xs px-3 py-2 rounded text-xs shadow-2xl border ${
              storageStatus.type === 'error'
                ? 'bg-red-500/20 border-red-500/40 text-red-300'
                : 'bg-zinc-100/10 border-zinc-700 text-zinc-200'
            }`}>
              {storageStatus.message}
            </div>
          )}

          {/* Preview modal */}
          {showPreview && (
            <div className="absolute inset-0 z-40 bg-black/70 backdrop-blur-sm flex flex-col">
              <div className="bg-zinc-900 border-b border-zinc-800 px-5 py-3 flex items-center justify-between flex-shrink-0">
                <div>
                  <h2 className="text-base font-semibold text-zinc-100">Preview Report</h2>
                  <p className="text-xs text-zinc-500 mt-0.5">Review before exporting. Close to make changes.</p>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => setShowPreview(false)}
                    className="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded text-sm font-medium flex items-center gap-1.5 transition"
                  >
                    <X size={14} />
                    Close
                  </button>
                  <button
                    onClick={exportHTML}
                    className="px-4 py-2 bg-zinc-100 hover:bg-white text-zinc-900 rounded text-sm font-semibold flex items-center gap-1.5 transition shadow-lg"
                  >
                    <Download size={14} />
                    Export HTML
                  </button>
                </div>
              </div>
              <iframe
                title="Report Preview"
                srcDoc={generateExportHTML(feedbacks)}
                className="flex-1 w-full bg-zinc-950 border-0"
              />
            </div>
          )}

          {/* Feedback list sidebar */}
          <div className="w-56 bg-zinc-950 border-r border-zinc-900 flex flex-col">
            <div className="px-4 py-3 border-b border-zinc-900 flex items-center justify-between">
              <h1 className="text-base font-bold text-zinc-100">Feedback Compiler</h1>
              <div className="relative" ref={menuRef}>
                <button
                  onClick={() => setShowMenu(!showMenu)}
                  className="p-1 rounded text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900 transition"
                  title="More options"
                >
                  <MoreHorizontal size={16} />
                </button>
                {showMenu && (
                  <div className="absolute right-0 top-full mt-1 w-52 bg-zinc-900 border border-zinc-800 rounded shadow-2xl z-30 py-1">
                    <button
                      onClick={exportSession}
                      disabled={feedbacks.length === 0}
                      className="w-full px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition"
                    >
                      <FolderDown size={14} className="text-zinc-400" />
                      Export session (.json)
                    </button>
                    <button
                      onClick={() => importFileRef.current?.click()}
                      className="w-full px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800 flex items-center gap-2 transition"
                    >
                      <FolderUp size={14} className="text-zinc-400" />
                      Import session (.json)
                    </button>
                    <div className="my-1 border-t border-zinc-800" />
                    <button
                      onClick={clearAllData}
                      disabled={feedbacks.length === 0}
                      className="w-full px-3 py-2 text-left text-sm text-red-400 hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition"
                    >
                      <Trash size={14} />
                      Clear all data
                    </button>
                    <div className="px-3 pt-2 pb-1 text-[10px] text-zinc-600 border-t border-zinc-800 mt-1">
                      Auto-saved in this browser
                    </div>
                  </div>
                )}
                <input
                  ref={importFileRef}
                  type="file"
                  accept="application/json"
                  onChange={handleImportSession}
                  className="hidden"
                />
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-3">
              <button
                onClick={createFeedback}
                className="w-full bg-zinc-100 hover:bg-white text-zinc-900 py-2.5 rounded font-semibold text-sm flex items-center justify-center gap-2 transition mb-3 shadow-lg"
              >
                <Plus size={16} />
                New Feedback
              </button>

              {feedbacks.length === 0 ? (
                <div className="text-center py-8 text-zinc-600 text-sm">
                  <MessageSquare size={32} className="mx-auto mb-2 opacity-40" />
                  No feedback yet
                </div>
              ) : (
                <div className="space-y-0.5">
                  {feedbacks.map((fb, idx) => {
                    const isActive = activeFeedbackId === fb.id;
                    return (
                      <div
                        key={fb.id}
                        onClick={() => { setActiveFeedbackId(fb.id); setActiveMediaId(fb.media[0]?.id || null); }}
                        className={`group relative pl-3 pr-2 py-2.5 rounded cursor-pointer transition ${
                          isActive ? 'bg-[#3f8efc]/10 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/40'
                        }`}
                      >
                        {isActive && <div className="absolute left-0 top-2 bottom-2 w-0.5 bg-[#3f8efc] rounded-r" />}
                        <div className="flex items-center justify-between gap-2">
                          <div className="flex items-center gap-2 min-w-0 flex-1">
                            <span className={`text-[11px] font-mono flex-shrink-0 ${isActive ? 'text-[#3f8efc]' : 'text-[#3f8efc]/60'}`}>
                              {String(idx + 1).padStart(2, '0')}
                            </span>
                            <div className={`text-sm truncate flex-1 ${isActive ? 'font-semibold' : 'font-medium'}`}>{fb.title}</div>
                          </div>
                          <button
                            onClick={(e) => { e.stopPropagation(); deleteFeedback(fb.id); }}
                            className="opacity-0 group-hover:opacity-100 transition text-zinc-600 hover:text-red-400 flex-shrink-0"
                          >
                            <Trash2 size={14} />
                          </button>
                        </div>
                        <div className={`text-xs mt-0.5 ml-7 ${isActive ? 'text-zinc-500' : 'text-zinc-600'}`}>
                          {fb.media.length} item{fb.media.length !== 1 ? 's' : ''}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {feedbacks.length > 0 && (
              <div className="p-3 border-t border-zinc-900">
                <button
                  onClick={() => setShowPreview(true)}
                  className="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-100 py-2.5 rounded font-medium text-sm flex items-center justify-center gap-2 transition border border-zinc-700"
                >
                  <Eye size={16} />
                  Preview & Export
                </button>
              </div>
            )}
          </div>

          {/* Main content */}
          <div className="flex-1 flex flex-col overflow-hidden">
            {!activeFeedback ? (
              <div className="flex-1 flex items-center justify-center p-6">
                <div className="text-center max-w-lg w-full">
                  <div className="w-14 h-14 mx-auto mb-3 rounded-lg bg-zinc-100 flex items-center justify-center shadow-lg">
                    <MessageSquare size={24} className="text-zinc-900" />
                  </div>
                  <h2 className="text-xl font-bold text-zinc-100 mb-2">Share visual feedback</h2>
                  <p className="text-zinc-400 text-sm mb-5">Upload screenshots or recordings, mark up what needs attention, add notes, and export an HTML report to share with developers.</p>
                  <DropZone onClick={() => fileInputRef.current.click()} onPaste={handleZonePaste} large />
                  <button
                    onClick={createFeedback}
                    className="mt-4 text-sm text-zinc-400 hover:text-zinc-200 transition inline-flex items-center gap-1.5"
                  >
                    <Plus size={14} />
                    Or create an empty feedback first
                  </button>
                </div>
              </div>
            ) : (
              <>
                <div className="flex-1 flex overflow-hidden">
                  {/* Media sub-panel */}
                  <div className="w-44 bg-zinc-900 border-r border-zinc-800 flex flex-col">
                    <div className="p-2.5 border-b border-zinc-800">
                      <button
                        onClick={() => fileInputRef.current.click()}
                        className="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-200 py-1.5 rounded text-xs font-medium flex items-center justify-center gap-1.5 transition"
                      >
                        <Upload size={12} />
                        Upload Media
                      </button>
                      <p className="text-[10px] text-zinc-500 text-center mt-1.5 leading-tight">
                        or drag &amp; drop anywhere
                      </p>
                    </div>
                    <div className="flex-1 overflow-y-auto p-2">
                      {activeFeedback.media.length === 0 ? (
                        <div className="text-center py-6 text-zinc-600 text-xs">No media uploaded</div>
                      ) : (
                        <div className="space-y-2">
                          {activeFeedback.media.map(m => (
                            <MediaThumbnail
                              key={m.id}
                              media={m}
                              isActive={activeMediaId === m.id}
                              onClick={() => setActiveMediaId(m.id)}
                              onDelete={() => deleteMedia(m.id)}
                            />
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Media viewer */}
                  <div className="flex-1 flex flex-col bg-zinc-950 overflow-hidden">
                    {!activeMedia ? (
                      <div className="flex-1 flex items-center justify-center p-6">
                        <div className="max-w-sm w-full text-center">
                          <DropZone onClick={() => fileInputRef.current.click()} onPaste={handleZonePaste} />
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="bg-zinc-900 border-b border-zinc-800 px-4 py-2.5 flex items-center justify-between gap-2 flex-shrink-0">
                          <div className="text-sm text-zinc-400">
                            {activeMedia.type === 'image' && annotationMode && (
                              <span className="flex items-center gap-2">
                                <span className="inline-block w-1.5 h-1.5 rounded-full bg-zinc-300 animate-pulse" />
                                Click any part of image to add
                              </span>
                            )}
                          </div>
                          <div className="flex items-center gap-2">
                            {activeMedia.type === 'image' && (
                              <>
                                {annotationCount > 0 && (
                                  <button
                                    onClick={() => setShowAnnotations(!showAnnotations)}
                                    className={`px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1.5 transition ${
                                      showAnnotations
                                        ? 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'
                                        : 'bg-transparent text-zinc-300 hover:bg-zinc-800 border border-zinc-800'
                                    }`}
                                  >
                                    {showAnnotations ? <PanelRightClose size={14} /> : <PanelRightOpen size={14} />}
                                    {annotationCount} {annotationCount === 1 ? 'note' : 'notes'}
                                  </button>
                                )}
                                <button
                                  onClick={() => setAnnotationMode(!annotationMode)}
                                  className={`px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1.5 transition ${
                                    annotationMode
                                      ? 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'
                                      : 'bg-zinc-100 text-zinc-900 hover:bg-white shadow-lg'
                                  }`}
                                >
                                  {annotationMode ? <X size={14} /> : <Edit3 size={14} />}
                                  {annotationMode ? 'Exit Annotate' : 'Annotate'}
                                </button>
                              </>
                            )}
                          </div>
                        </div>

                        <div className="flex-1 overflow-auto p-4 flex items-start justify-center">
                          {activeMedia.type === 'image' ? (
                            <div className="relative inline-block max-w-full">
                              <img
                                ref={imageRef}
                                src={activeMedia.dataUrl}
                                alt={activeMedia.name}
                                onClick={handleImageClick}
                                className={`max-w-full rounded shadow-2xl ${annotationMode ? 'cursor-crosshair' : ''}`}
                                style={{ maxHeight: 'calc(100vh - 160px)' }}
                              />
                              {activeMedia.annotations.map(a => (
                                <div
                                  key={a.id}
                                  className="absolute w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center font-bold text-xs border-2 border-zinc-950 shadow-lg hover:scale-110 transition-transform cursor-pointer"
                                  style={{ left: `${a.x}%`, top: `${a.y}%`, transform: 'translate(-50%, -50%)' }}
                                  title={a.note}
                                  onClick={() => setShowAnnotations(true)}
                                >
                                  {a.number}
                                </div>
                              ))}
                              {currentAnnotation && (
                                <div
                                  className="absolute w-7 h-7 bg-yellow-400 text-zinc-900 rounded-full flex items-center justify-center font-bold text-xs border-2 border-zinc-950 shadow-lg animate-pulse"
                                  style={{ left: `${currentAnnotation.x}%`, top: `${currentAnnotation.y}%`, transform: 'translate(-50%, -50%)' }}
                                >
                                  {activeMedia.annotations.length + 1}
                                </div>
                              )}
                            </div>
                          ) : (
                            <div className="flex flex-col items-center w-full max-w-3xl">
                              {videoError ? (
                                <VideoErrorCard media={activeMedia} />
                              ) : (
                                <video
                                  key={activeMedia.id}
                                  src={activeMedia.dataUrl}
                                  controls
                                  controlsList="nodownload"
                                  playsInline
                                  onError={(e) => {
                                    if (e.target.error?.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                                      setVideoError(true);
                                    }
                                  }}
                                  className="max-w-full w-full rounded shadow-2xl bg-black"
                                  style={{ maxHeight: '60vh' }}
                                >
                                  Your browser does not support this video format.
                                </video>
                              )}
                              <div className="w-full mt-4 bg-zinc-900 rounded border border-zinc-800 p-4">
                                <label className="text-xs font-semibold text-zinc-400 uppercase tracking-wide mb-2 block">Note for this video</label>
                                <textarea
                                  value={activeMedia.note || ''}
                                  onChange={(e) => updateMediaNote(activeMedia.id, e.target.value)}
                                  placeholder="Add a short note about this recording..."
                                  className="w-full text-sm text-zinc-100 bg-zinc-950 border border-zinc-800 rounded px-3 py-2 outline-none focus:border-zinc-500 focus:ring-2 focus:ring-zinc-500/20 transition resize-none placeholder:text-zinc-600"
                                  rows={3}
                                />
                              </div>
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>

                  {/* Annotations panel */}
                  {activeMedia?.type === 'image' && showAnnotations && (
                    <div className="w-64 bg-zinc-900 border-l border-zinc-800 flex flex-col flex-shrink-0">
                      <div className="px-3 py-2.5 border-b border-zinc-800 flex items-center justify-between">
                        <div>
                          <h3 className="font-semibold text-zinc-100 text-sm">Annotations</h3>
                          <p className="text-[11px] text-zinc-500 mt-0.5">
                            {annotationCount} {annotationCount === 1 ? 'note' : 'notes'}
                          </p>
                        </div>
                        <button
                          onClick={() => setShowAnnotations(false)}
                          className="text-zinc-500 hover:text-zinc-200 p-1 rounded hover:bg-zinc-800 transition"
                        >
                          <X size={14} />
                        </button>
                      </div>

                      {currentAnnotation && (
                        <div className="p-4 bg-yellow-500/10 border-b border-yellow-500/30">
                          <div className="flex items-center justify-between mb-2">
                            <div className="text-xs font-medium text-yellow-400">New annotation</div>
                            <div className={`text-[10px] font-mono ${annotationNote.length > ANNOTATION_MAX_LENGTH - 20 ? 'text-yellow-400' : 'text-zinc-500'}`}>
                              {annotationNote.length}/{ANNOTATION_MAX_LENGTH}
                            </div>
                          </div>
                          <textarea
                            value={annotationNote}
                            onChange={(e) => {
                              const v = e.target.value;
                              if (v.length <= ANNOTATION_MAX_LENGTH) setAnnotationNote(v);
                            }}
                            onKeyDown={(e) => {
                              if (e.key === 'Enter' && !e.shiftKey) {
                                e.preventDefault();
                                if (annotationNote.trim()) saveAnnotation();
                              }
                            }}
                            maxLength={ANNOTATION_MAX_LENGTH}
                            placeholder="Describe the issue or feedback..."
                            autoFocus
                            className="w-full text-sm bg-zinc-950 text-zinc-100 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 transition resize-none placeholder:text-zinc-600"
                            rows={3}
                          />
                          <div className="flex items-center justify-end gap-2 mt-2">
                            <button
                              onClick={() => { setCurrentAnnotation(null); setAnnotationNote(''); }}
                              className="px-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 py-1.5 rounded text-sm transition"
                            >
                              <X size={14} />
                            </button>
                            <button
                              onClick={saveAnnotation}
                              disabled={!annotationNote.trim()}
                              className="bg-zinc-100 text-zinc-900 py-1.5 px-4 rounded text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-white transition flex items-center justify-center gap-1"
                            >
                              <Save size={12} />
                              Save
                            </button>
                          </div>
                        </div>
                      )}

                      <div className="flex-1 overflow-y-auto p-3">
                        {activeMedia.annotations.length === 0 && !currentAnnotation ? (
                          <div className="text-center py-8 text-zinc-600 text-sm">
                            Click "Annotate" then tap the image
                          </div>
                        ) : (
                          activeMedia.annotations.map(a => {
                            const isEditing = editingAnnotationId === a.id;
                            return (
                              <div key={a.id} className="group p-3 mb-2 bg-zinc-800/50 rounded border border-zinc-800">
                                <div className="flex items-start gap-2">
                                  <div className="w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center font-bold text-xs flex-shrink-0">
                                    {a.number}
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    {isEditing ? (
                                      <>
                                        <div className="flex items-center justify-between mb-1.5">
                                          <div className="text-[10px] uppercase tracking-wide text-zinc-300 font-semibold">Editing</div>
                                          <div className={`text-[10px] font-mono ${editingNote.length > ANNOTATION_MAX_LENGTH - 20 ? 'text-yellow-400' : 'text-zinc-500'}`}>
                                            {editingNote.length}/{ANNOTATION_MAX_LENGTH}
                                          </div>
                                        </div>
                                        <textarea
                                          value={editingNote}
                                          onChange={(e) => {
                                            const v = e.target.value;
                                            if (v.length <= ANNOTATION_MAX_LENGTH) setEditingNote(v);
                                          }}
                                          onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                              e.preventDefault();
                                              if (editingNote.trim()) saveEditAnnotation();
                                            } else if (e.key === 'Escape') {
                                              cancelEditAnnotation();
                                            }
                                          }}
                                          maxLength={ANNOTATION_MAX_LENGTH}
                                          autoFocus
                                          className="w-full text-sm bg-zinc-950 text-zinc-100 border border-zinc-700 rounded px-2 py-1.5 outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 transition resize-none placeholder:text-zinc-600"
                                          rows={3}
                                        />
                                        <div className="flex items-center justify-end gap-1.5 mt-1.5">
                                          <button
                                            onClick={cancelEditAnnotation}
                                            className="px-2 py-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded text-xs transition"
                                          >
                                            Cancel
                                          </button>
                                          <button
                                            onClick={saveEditAnnotation}
                                            disabled={!editingNote.trim()}
                                            className="px-3 py-1 bg-zinc-100 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-zinc-900 rounded text-xs font-semibold transition flex items-center gap-1"
                                          >
                                            <Save size={10} />
                                            Save
                                          </button>
                                        </div>
                                      </>
                                    ) : (
                                      <div
                                        onClick={() => startEditAnnotation(a)}
                                        className="text-sm text-zinc-200 whitespace-pre-wrap break-words cursor-text hover:bg-zinc-800/50 -mx-1 px-1 py-0.5 rounded transition"
                                        title="Click to edit"
                                      >
                                        {a.note}
                                      </div>
                                    )}
                                  </div>
                                  {!isEditing && (
                                    <div className="flex items-center gap-1 flex-shrink-0">
                                      <button
                                        onClick={() => startEditAnnotation(a)}
                                        className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-zinc-200 transition"
                                        title="Edit"
                                      >
                                        <Edit3 size={12} />
                                      </button>
                                      <button
                                        onClick={() => deleteAnnotation(a.id)}
                                        className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 transition"
                                        title="Delete"
                                      >
                                        <Trash2 size={12} />
                                      </button>
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>
                    </div>
                  )}
                </div>

                {/* Bottom feedback panel */}
                <div className="bg-zinc-900 border-t border-zinc-800 flex-shrink-0">
                  <button
                    onClick={() => setBottomCollapsed(!bottomCollapsed)}
                    className="w-full flex items-center justify-between px-4 py-1.5 text-[11px] text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50 transition"
                  >
                    <span className="font-medium uppercase tracking-wide">
                      {bottomCollapsed ? activeFeedback.title : 'Feedback details'}
                    </span>
                    {bottomCollapsed ? <ChevronUp size={12} /> : <ChevronDown size={12} />}
                  </button>
                  {!bottomCollapsed && (
                    <div className="px-4 pb-3">
                      <div className="max-w-4xl mx-auto">
                        <div className="relative mb-1.5 group">
                          <input
                            type="text"
                            value={activeFeedback.title}
                            onChange={(e) => {
                              let v = e.target.value;
                              if (v.length > 0) v = v.charAt(0).toUpperCase() + v.slice(1);
                              updateFeedback(activeFeedback.id, { title: v });
                            }}
                            onKeyDown={(e) => {
                              if (e.key === 'Enter') {
                                e.preventDefault();
                                overallNoteRef.current?.focus();
                              }
                            }}
                            autoCapitalize="sentences"
                            className="text-base font-bold text-zinc-100 bg-zinc-950/50 border border-zinc-800 outline-none w-full hover:border-zinc-700 hover:bg-zinc-950 focus:bg-zinc-950 focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 pl-3 pr-9 py-1.5 rounded transition cursor-text"
                            placeholder="Feedback title"
                            title="Click to edit title"
                          />
                          <Edit3
                            size={12}
                            className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 group-hover:text-zinc-400 transition pointer-events-none group-focus-within:hidden"
                          />
                          {activeFeedback.title && (
                            <button
                              type="button"
                              onMouseDown={(e) => {
                                // Prevent input blur so the clear feels instant
                                e.preventDefault();
                                updateFeedback(activeFeedback.id, { title: '' });
                              }}
                              className="hidden group-focus-within:flex absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded-full transition"
                              title="Clear title"
                            >
                              <X size={12} />
                            </button>
                          )}
                        </div>
                        <textarea
                          ref={overallNoteRef}
                          value={activeFeedback.overallNote}
                          onChange={(e) => updateFeedback(activeFeedback.id, { overallNote: e.target.value })}
                          placeholder="Overall note — describe the feedback, context, or issues..."
                          className="w-full text-sm text-zinc-200 bg-zinc-950 border border-zinc-800 rounded px-3 py-2 outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 transition resize-none placeholder:text-zinc-600"
                          rows={2}
                        />
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}

            <input
              ref={fileInputRef}
              type="file"
              accept="image/*,video/*"
              multiple
              onChange={handleFileUpload}
              className="hidden"
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FeedbackPlatform />);
  </script>
</body>
</html>
