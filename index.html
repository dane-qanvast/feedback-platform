<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Compiler</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fafafa' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='22' height='22' x='1' y='1' rx='4' fill='%2318181b' stroke='none'/%3E%3Cpath d='M19 14a1.5 1.5 0 0 1-1.5 1.5H8L5 18.5V6.5A1.5 1.5 0 0 1 6.5 5h11A1.5 1.5 0 0 1 19 6.5z'/%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100dvh; background: #09090b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; border: 2px solid #09090b; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    ::-webkit-scrollbar-corner { background: #09090b; }
    * { scrollbar-width: thin; scrollbar-color: #27272a #09090b; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-toast-in { animation: toast-in 200ms ease-out; }
    @keyframes coach-in-down { from { opacity: 0; transform: translateY(-6px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-coach-in-down { animation: coach-in-down 220ms cubic-bezier(0.16, 1, 0.3, 1); transform-origin: top right; }
    @keyframes coach-in-up { from { opacity: 0; transform: translateY(6px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-coach-in-up { animation: coach-in-up 220ms cubic-bezier(0.16, 1, 0.3, 1); transform-origin: bottom center; }
    @keyframes tip-fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
    .animate-tip-fade { animation: tip-fade 360ms ease-out; }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 240ms cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slide-down { from { transform: translateY(0); } to { transform: translateY(100%); } }
    .animate-slide-down { animation: slide-down 240ms cubic-bezier(0.7, 0, 0.84, 0) forwards; }

    /* ---------- Mobile-specific styles ----------
       Below 768px the layout collapses into a single column with a slide-in
       sidebar drawer. Input/textarea font size is forced to 16px because iOS
       Safari auto-zooms when focusing a field smaller than that, which is
       jarring on touch devices.
    */
    @media (max-width: 767px) {
      input, textarea, select {
        font-size: 16px !important;
      }
      /* Slightly tighter outer padding on the main content area at mobile. */
      .mobile-content-pad {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
    }
    /* Sidebar drawer transition (mobile only). Desktop uses md: utility classes
       to override the transform and keep the sidebar always visible. */
    .mobile-sidebar-transition {
      transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ---------- Dark theme overrides ----------
       Activated by data-theme="dark" on the <html> element. Shifts the neutral
       zinc Tailwind utilities to a blue-tinted slate palette so the UI reads
       cooler / less greige. Primary buttons (bg-zinc-100) flip from white to
       the accent blue for a more product-like feel. The accent blue (#3f8efc)
       and red still stand out against the cooler surface tones.
    */
    [data-theme="dark"] { color-scheme: dark; }

    /* Surfaces — blue-tinted dark */
    [data-theme="dark"] .bg-zinc-950 { background-color: #0a0f1c !important; }
    [data-theme="dark"] .bg-zinc-900 { background-color: #13192a !important; }
    [data-theme="dark"] .bg-zinc-800 { background-color: #1e2638 !important; }
    [data-theme="dark"] .bg-zinc-700 { background-color: #2d3548 !important; }
    [data-theme="dark"] .hover\:bg-zinc-900:hover { background-color: #13192a !important; }
    [data-theme="dark"] .hover\:bg-zinc-800:hover { background-color: #232c40 !important; }
    [data-theme="dark"] .hover\:bg-zinc-700:hover { background-color: #374257 !important; }

    /* Translucent variants — keep the same hue, adjust alpha */
    [data-theme="dark"] .bg-zinc-900\/40 { background-color: rgba(19, 25, 42, 0.4) !important; }
    [data-theme="dark"] .bg-zinc-900\/30 { background-color: rgba(19, 25, 42, 0.3) !important; }
    [data-theme="dark"] .bg-zinc-900\/50 { background-color: rgba(19, 25, 42, 0.5) !important; }
    [data-theme="dark"] .hover\:bg-zinc-900\/40:hover { background-color: rgba(19, 25, 42, 0.55) !important; }
    [data-theme="dark"] .hover\:bg-zinc-900\/60:hover { background-color: rgba(19, 25, 42, 0.6) !important; }
    [data-theme="dark"] .bg-zinc-800\/50 { background-color: rgba(30, 38, 56, 0.5) !important; }
    [data-theme="dark"] .hover\:bg-zinc-800\/50:hover { background-color: rgba(30, 38, 56, 0.7) !important; }
    [data-theme="dark"] .bg-zinc-800\/60 { background-color: rgba(30, 38, 56, 0.6) !important; }
    [data-theme="dark"] .hover\:bg-zinc-800\/60:hover { background-color: rgba(30, 38, 56, 0.6) !important; }
    [data-theme="dark"] .bg-zinc-950\/50 { background-color: rgba(10, 15, 28, 0.5) !important; }
    [data-theme="dark"] .hover\:bg-zinc-950:hover { background-color: #0a0f1c !important; }
    [data-theme="dark"] .focus\:bg-zinc-950:focus { background-color: #0a0f1c !important; }

    /* Borders — subtle blue-tinted gray, no full black lines */
    [data-theme="dark"] .border-zinc-900 { border-color: #1a2138 !important; }
    [data-theme="dark"] .border-zinc-800 { border-color: #252d44 !important; }
    [data-theme="dark"] .border-zinc-700 { border-color: #374257 !important; }
    [data-theme="dark"] .border-zinc-700\/60 { border-color: rgba(55, 66, 87, 0.6) !important; }

    /* Text — slate equivalents (slightly cooler than zinc) */
    [data-theme="dark"] .text-zinc-300 { color: #cbd5e1 !important; }
    [data-theme="dark"] .text-zinc-400 { color: #94a3b8 !important; }
    [data-theme="dark"] .text-zinc-500 { color: #64748b !important; }
    [data-theme="dark"] .text-zinc-600 { color: #475569 !important; }

    /* Primary buttons (bg-zinc-100 + text-zinc-900) → solid blue + white text.
       This pattern is used by New Feedback, Export, and active Annotate. */
    [data-theme="dark"] .bg-zinc-100 { background-color: #3f8efc !important; }
    [data-theme="dark"] .hover\:bg-white:hover { background-color: #5a9efd !important; }
    [data-theme="dark"] .text-zinc-900 { color: #ffffff !important; }

    /* Scrollbar — match the new surface tones */
    [data-theme="dark"] ::-webkit-scrollbar-track { background: #0a0f1c; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #1e2638; border: 2px solid #0a0f1c; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #2d3548; }
    [data-theme="dark"] ::-webkit-scrollbar-corner { background: #0a0f1c; }
    [data-theme="dark"] * { scrollbar-color: #1e2638 #0a0f1c; }

    /* ---------- Light theme overrides ----------
       Activated by data-theme="light" on the <html> element (toggled by a
       useEffect when the theme state changes). The app is built dark-first
       with hardcoded Tailwind zinc utilities, so light mode flips the scale
       via class-targeted overrides rather than refactoring every JSX className.
       The accent blue (#3f8efc), reds, and overlay backgrounds (bg-black/X)
       stay the same in both themes.
    */
    [data-theme="light"] { color-scheme: light; }

    /* Surfaces — invert zinc scale */
    [data-theme="light"] .bg-zinc-950 { background-color: #f8fafc !important; }
    [data-theme="light"] .bg-zinc-900 { background-color: #fafafa !important; }
    [data-theme="light"] .bg-zinc-800 { background-color: #f4f4f5 !important; }
    [data-theme="light"] .bg-zinc-700 { background-color: #e4e4e7 !important; }
    [data-theme="light"] .bg-zinc-100 { background-color: #18181b !important; }   /* primary buttons flip to dark */
    [data-theme="light"] .hover\:bg-zinc-900:hover { background-color: #f4f4f5 !important; }
    [data-theme="light"] .hover\:bg-zinc-800:hover { background-color: #e4e4e7 !important; }
    [data-theme="light"] .hover\:bg-zinc-700:hover { background-color: #d4d4d8 !important; }
    [data-theme="light"] .hover\:bg-white:hover { background-color: #27272a !important; }   /* primary button hover flips dark */
    [data-theme="light"] .bg-zinc-900\/40 { background-color: rgba(244, 244, 245, 0.6) !important; }
    [data-theme="light"] .hover\:bg-zinc-900\/40:hover { background-color: rgba(228, 228, 231, 0.7) !important; }
    [data-theme="light"] .bg-zinc-900\/30 { background-color: rgba(244, 244, 245, 0.5) !important; }
    [data-theme="light"] .hover\:bg-zinc-900\/60:hover { background-color: rgba(228, 228, 231, 0.8) !important; }
    [data-theme="light"] .bg-zinc-900\/50 { background-color: rgba(244, 244, 245, 0.6) !important; }
    [data-theme="light"] .hover\:bg-zinc-800\/60:hover { background-color: rgba(228, 228, 231, 0.7) !important; }
    [data-theme="light"] .bg-zinc-800\/60 { background-color: rgba(228, 228, 231, 0.6) !important; }

    /* Text — invert zinc scale */
    [data-theme="light"] .text-zinc-100 { color: #18181b !important; }
    [data-theme="light"] .text-zinc-200 { color: #27272a !important; }
    [data-theme="light"] .text-zinc-300 { color: #3f3f46 !important; }
    [data-theme="light"] .text-zinc-400 { color: #52525b !important; }
    [data-theme="light"] .text-zinc-500 { color: #71717a !important; }
    [data-theme="light"] .text-zinc-600 { color: #a1a1aa !important; }
    [data-theme="light"] .text-zinc-900 { color: #fafafa !important; }   /* primary button text flips */
    [data-theme="light"] .hover\:text-zinc-200:hover { color: #18181b !important; }
    [data-theme="light"] .hover\:text-zinc-300:hover { color: #27272a !important; }
    [data-theme="light"] .hover\:text-white:hover { color: #18181b !important; }
    [data-theme="light"] .placeholder\:text-zinc-600::placeholder { color: #d4d4d8 !important; }

    /* Borders */
    [data-theme="light"] .border-zinc-900 { border-color: #e4e4e7 !important; }
    [data-theme="light"] .border-zinc-800 { border-color: #e4e4e7 !important; }
    [data-theme="light"] .border-zinc-700 { border-color: #d4d4d8 !important; }
    [data-theme="light"] .border-zinc-700\/60 { border-color: rgba(212, 212, 216, 0.6) !important; }
    [data-theme="light"] .border-zinc-300 { border-color: #d4d4d8 !important; }
    [data-theme="light"] .focus\:border-zinc-400:focus { border-color: #71717a !important; }
    [data-theme="light"] .focus\:border-zinc-500:focus { border-color: #52525b !important; }
    [data-theme="light"] .hover\:border-zinc-500:hover { border-color: #71717a !important; }
    [data-theme="light"] .hover\:border-zinc-600:hover { border-color: #52525b !important; }

    /* Focus rings */
    [data-theme="light"] .focus\:ring-zinc-400\/20:focus { box-shadow: 0 0 0 2px rgba(82, 82, 91, 0.2) !important; }
    [data-theme="light"] .focus\:ring-zinc-400\/30:focus { box-shadow: 0 0 0 2px rgba(82, 82, 91, 0.3) !important; }
    [data-theme="light"] .focus\:ring-zinc-400\/40:focus { box-shadow: 0 0 0 2px rgba(82, 82, 91, 0.4) !important; }
    [data-theme="light"] .focus\:ring-zinc-500\/20:focus { box-shadow: 0 0 0 2px rgba(113, 113, 122, 0.2) !important; }
    [data-theme="light"] .focus\:ring-zinc-500\/30:focus { box-shadow: 0 0 0 2px rgba(113, 113, 122, 0.3) !important; }

    /* Accent pieces that look off in light mode get tuned down */
    [data-theme="light"] .bg-\[\#3f8efc\]\/10 { background-color: rgba(63, 142, 252, 0.08) !important; }
    [data-theme="light"] .text-\[\#3f8efc\]\/60 { color: rgba(63, 142, 252, 0.85) !important; }

    /* Annotation panel — translucent zinc/yellow shades need their own overrides
       because the /XX opacity classes don't match the plain bg-zinc-NNN selectors. */
    [data-theme="light"] .bg-zinc-800\/50 { background-color: rgba(244, 244, 245, 0.8) !important; }
    [data-theme="light"] .hover\:bg-zinc-800\/50:hover { background-color: rgba(228, 228, 231, 0.9) !important; }
    [data-theme="light"] .bg-yellow-500\/10 { background-color: rgba(245, 158, 11, 0.12) !important; }
    [data-theme="light"] .border-yellow-500\/30 { border-color: rgba(245, 158, 11, 0.45) !important; }
    [data-theme="light"] .text-yellow-400 { color: #b45309 !important; }

    /* Bottom-panel title input — uses bg-zinc-950/50 + hover/focus variants */
    [data-theme="light"] .bg-zinc-950\/50 { background-color: rgba(255, 255, 255, 0.6) !important; }
    [data-theme="light"] .hover\:bg-zinc-950:hover { background-color: #ffffff !important; }
    [data-theme="light"] .focus\:bg-zinc-950:focus { background-color: #ffffff !important; }

    /* Scrollbars — flip the dark zinc track/thumb to light equivalents */
    [data-theme="light"] ::-webkit-scrollbar-track { background: #fafafa; }
    [data-theme="light"] ::-webkit-scrollbar-thumb { background: #d4d4d8; border: 2px solid #fafafa; }
    [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    [data-theme="light"] ::-webkit-scrollbar-corner { background: #fafafa; }
    [data-theme="light"] * { scrollbar-color: #d4d4d8 #fafafa; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useEffect, useMemo } = React;

    const Icon = ({ children, size = 16, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Edit3 = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const MessageSquare = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const PanelRightOpen = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><path d="m8 9 3 3-3 3"/></Icon>;
    const PanelRightClose = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/><path d="m11 15-3-3 3-3"/></Icon>;
    const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const FolderUp = (p) => <Icon {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m9 13 3-3 3 3"/></Icon>;
    const FolderDown = (p) => <Icon {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M12 10v6"/><path d="m15 13-3 3-3-3"/></Icon>;
    const MoreHorizontal = (p) => <Icon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>;
    const Trash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
    const Link2 = (p) => <Icon {...p}><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></Icon>;
    const ExternalLink = (p) => <Icon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Icon>;
    const Pencil = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></Icon>;
    const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></Icon>;
    const Moon = (p) => <Icon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></Icon>;
    const ImageIcon = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></Icon>;
    const Menu = (p) => <Icon {...p}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;

    // Floating-label tooltip used on icon-only and small-text buttons. Apply
    // `group relative` to the parent button and drop a <Tooltip> inside. Set
    // `anchor="right"` for buttons sitting against the right edge of a column
    // so the label doesn't clip off-screen.
    const Tooltip = ({ children, anchor = 'center' }) => (
      <span className={`pointer-events-none absolute top-full ${anchor === 'right' ? 'right-0' : 'left-1/2 -translate-x-1/2'} mt-1.5 px-2 py-1 bg-zinc-950 text-zinc-100 text-[11px] font-medium rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-150 z-30 border border-zinc-700 shadow-lg`}>{children}</span>
    );

    const ANNOTATION_MAX_LENGTH = 200;
    const STORAGE_KEY = 'feedback-platform-data';
    const AUTHOR_KEY = 'feedback-platform-author-name';
    const THEME_KEY = 'feedback-platform-theme';

    // Robust unique ID — avoids collisions from rapid Date.now() calls in the same tick.
    let _uidCounter = 0;
    const uid = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      _uidCounter = (_uidCounter + 1) % 1e9;
      return `${Date.now().toString(36)}-${_uidCounter.toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    };

    const isImageType = (type) => typeof type === 'string' && type.startsWith('image/');
    // Match by MIME first, fall back to filename extension for cases where the
    // browser/OS doesn't supply a MIME (e.g., some .mkv or rare formats).
    const isVideoFile = (f) => {
      if (typeof f?.type === 'string' && f.type.startsWith('video/')) return true;
      return /\.(mp4|mov|webm|avi|mkv|m4v|mpeg|mpg|wmv|flv|ogv|3gp)$/i.test(f?.name || '');
    };
    const escapeHtml = (str) => str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') : '';
    const todayStr = () => new Date().toISOString().split('T')[0];
    // Produces a filename-safe suffix from the author name, e.g. "Dr. Alex Smith"
    // → "-dr-alex-smith". Returns an empty string when the name is blank or has
    // no usable characters, so the caller can interpolate unconditionally.
    const authorSuffix = (name) => {
      const slug = (name || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40);
      return slug ? `-${slug}` : '';
    };
    const nextAnnotationNumber = (annotations) => annotations.length ? Math.max(...annotations.map(a => a.number)) + 1 : 1;
    const displayTitle = (fb) => (fb?.title || '').trim() || 'Untitled';

    // Smart-typing substitutions for text inputs/textareas. Each pattern is a
    // /g regex that matches a 2-character source and a 1-character replacement
    // — so each match shortens the string by exactly one character, which is
    // how the cursor adjustment is computed.
    const SMART_PATTERNS = [
      { from: /->/g, to: '→' },
      { from: /--/g, to: '—' },
    ];

    // Apply the smart-typing patterns to the raw input value and restore the
    // cursor position on the next frame so typing mid-string doesn't jump.
    const applySmartReplace = (e) => {
      const el = e.target;
      const raw = el.value;
      let replaced = raw;
      for (const { from, to } of SMART_PATTERNS) replaced = replaced.replace(from, to);
      if (replaced === raw) return raw;
      const cursorPos = el.selectionStart ?? raw.length;
      const before = raw.slice(0, cursorPos);
      let shift = 0;
      for (const { from } of SMART_PATTERNS) shift += (before.match(from) || []).length;
      if (shift > 0) {
        const newCursor = cursorPos - shift;
        requestAnimationFrame(() => {
          if (document.activeElement === el) {
            try { el.setSelectionRange(newCursor, newCursor); } catch (err) {}
          }
        });
      }
      return replaced;
    };

    const readFileAsDataURL = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });

    const buildMediaItem = async (file) => ({
      id: uid(),
      name: file.name,
      type: 'image',
      dataUrl: await readFileAsDataURL(file),
      annotations: [],
      note: '',
    });

    const detectLinkProvider = (url) => {
      try {
        const u = new URL(url);
        const host = u.hostname.replace(/^www\./, '');
        if (/(^|\.)drive\.google\.com$/.test(host)) return 'gdrive';
        if (/(^|\.)docs\.google\.com$/.test(host)) return 'gdocs';
        if (/(^|\.)loom\.com$/.test(host)) return 'loom';
        if (/(^|\.)(youtube\.com|youtu\.be)$/.test(host)) return 'youtube';
        if (/(^|\.)vimeo\.com$/.test(host)) return 'vimeo';
        if (/(^|\.)dropbox\.com$/.test(host)) return 'dropbox';
        if (/(^|\.)(notion\.so|notion\.site)$/.test(host)) return 'notion';
        if (/(^|\.)figma\.com$/.test(host)) return 'figma';
        return 'generic';
      } catch { return 'generic'; }
    };

    const providerInfo = {
      gdrive: { label: 'Google Drive', icon: '📁' },
      gdocs: { label: 'Google Docs', icon: '📄' },
      loom: { label: 'Loom', icon: '🎬' },
      youtube: { label: 'YouTube', icon: '▶️' },
      vimeo: { label: 'Vimeo', icon: '🎥' },
      dropbox: { label: 'Dropbox', icon: '📦' },
      notion: { label: 'Notion', icon: '📝' },
      figma: { label: 'Figma', icon: '🎨' },
      generic: { label: 'Link', icon: '🔗' },
    };

    const getEmbedUrl = (provider, url) => {
      try {
        const u = new URL(url);
        if (provider === 'youtube') {
          let videoId = u.hostname.includes('youtu.be') ? u.pathname.slice(1) : (u.searchParams.get('v') || '');
          return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }
        if (provider === 'loom') {
          const match = u.pathname.match(/\/share\/([a-zA-Z0-9]+)/);
          return match ? `https://www.loom.com/embed/${match[1]}` : null;
        }
        if (provider === 'vimeo') {
          const match = u.pathname.match(/\/(\d+)/);
          return match ? `https://player.vimeo.com/video/${match[1]}` : null;
        }
        if (provider === 'gdrive') {
          const match = u.pathname.match(/\/d\/([a-zA-Z0-9_-]+)/);
          return match ? `https://drive.google.com/file/d/${match[1]}/preview` : null;
        }
        return null;
      } catch { return null; }
    };

    const buildLinkItem = (url, title) => {
      const provider = detectLinkProvider(url);
      return {
        id: uid(),
        // Stored "name" is the user-visible title for the link. Defaults to the
        // provider label (e.g. "Google Docs") when no better name is available,
        // and the paste handler passes a value extracted from clipboard HTML
        // when the user pastes from a context that includes a link title.
        name: (title || '').trim() || providerInfo[provider].label,
        type: 'link',
        url,
        provider,
        annotations: [],
        note: '',
      };
    };

    const buildFeedbackPrompt = (fb, author) => {
      const lines = [];
      // Context header so the AI/developer knows what they're looking at.
      // The developer adds their own task after pasting (fix, ticket, summarize, etc).
      lines.push('Feedback collected from a UI/UX feedback session. Numbered items under each screenshot are markers placed at specific positions on the image. Screenshot files are not attached — attach separately if visual context is needed.');
      if (author && author.trim()) {
        lines.push('');
        lines.push(`Submitted by ${author.trim()}.`);
      }
      lines.push('');
      lines.push('---');
      lines.push('');
      lines.push(`## Feedback: ${displayTitle(fb)}`);
      if (fb.overallNote && fb.overallNote.trim()) {
        lines.push('');
        lines.push('**Overall feedback:**');
        lines.push(fb.overallNote.trim());
      }
      for (const m of (fb.media || [])) {
        if (m.type === 'image') {
          const annots = m.annotations || [];
          lines.push('');
          lines.push(`### Screenshot: ${m.name}`);
          if (annots.length > 0) {
            for (const a of annots) {
              const note = (a.note || '').replace(/\s+$/, '');
              const noteLines = note.split('\n');
              lines.push(`${a.number}. ${noteLines[0]}`);
              for (let i = 1; i < noteLines.length; i++) lines.push(`   ${noteLines[i]}`);
            }
          }
        } else if (m.type === 'link') {
          const info = providerInfo[m.provider];
          lines.push('');
          lines.push(`### ${info.label} link`);
          lines.push(m.url);
          if (m.note && m.note.trim()) {
            lines.push('');
            lines.push(`Note: ${m.note.trim()}`);
          }
        }
      }
      return lines.join('\n');
    };

    // ---------- CSV export ----------
    // Quotes a cell only when needed (commas, quotes, or newlines). Doubled
    // quotes inside the string per RFC 4180.
    const csvEscape = (val) => {
      const s = val == null ? '' : String(val);
      return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const csvRow = (cols) => cols.map(csvEscape).join(',');

    // Flat row-per-annotation export. Media without annotations and feedbacks
    // without media still get a row each so nothing in the session is dropped.
    // BOM + CRLF gives Google Sheets and Excel clean UTF-8 handling.
    //
    // The Media cell is rendered as a HYPERLINK formula (clickable in Sheets/
    // Excel). For image rows the URL is the data URI; for link rows it's the
    // external URL. Google Sheets caps cells at 50,000 chars — most full-size
    // screenshots will exceed that, so the size guard falls back to a plain
    // text filename when the formula wouldn't fit.
    const SHEET_CELL_LIMIT = 49000;
    const sheetHyperlink = (url, label) => {
      const safeLabel = String(label || '').replace(/"/g, '""');
      if (!url || (url.length + safeLabel.length + 18) > SHEET_CELL_LIMIT) return label || '';
      const safeUrl = String(url).replace(/"/g, '""');
      return `=HYPERLINK("${safeUrl}","${safeLabel}")`;
    };
    const generateExportCSV = (data, author = '') => {
      const date = new Date().toLocaleDateString();
      const rows = [csvRow(['Feedback #', 'Title', 'Overall feedback', 'Media', 'Type', 'Annotation #', 'Annotation', 'Author', 'Date'])];
      data.forEach((fb, fbIdx) => {
        const num = String(fbIdx + 1).padStart(2, '0');
        const title = (fb.title || '').trim() || 'Untitled';
        const note = fb.overallNote || '';
        if (!fb.media || fb.media.length === 0) {
          rows.push(csvRow([num, title, note, '', '', '', '', author, date]));
          return;
        }
        fb.media.forEach(m => {
          const isLink = m.type === 'link';
          const url = isLink ? m.url : m.dataUrl;
          const label = isLink ? ((m.name && m.name.trim()) || m.url || '') : (m.name || 'image');
          const mediaCell = sheetHyperlink(url, label);
          const mediaType = isLink ? 'link' : 'image';
          if (m.type === 'image' && Array.isArray(m.annotations) && m.annotations.length > 0) {
            m.annotations.forEach(a => {
              rows.push(csvRow([num, title, note, mediaCell, mediaType, a.number, a.note || '', author, date]));
            });
          } else {
            rows.push(csvRow([num, title, note, mediaCell, mediaType, '', '', author, date]));
          }
        });
      });
      return '\uFEFF' + rows.join('\r\n');
    };

    // ---------- XLSX export (embedded images) ----------
    // ExcelJS is lazy-loaded on first XLSX export so the ~830KB library doesn't
    // cost initial page weight. Promise is memoised so concurrent clicks share
    // one load.
    let exceljsPromise = null;
    const loadExcelJS = () => {
      if (window.ExcelJS) return Promise.resolve();
      if (exceljsPromise) return exceljsPromise;
      exceljsPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
        s.onload = () => resolve();
        s.onerror = () => { exceljsPromise = null; reject(new Error('Failed to load ExcelJS — check your network connection')); };
        document.head.appendChild(s);
      });
      return exceljsPromise;
    };

    // Pull `png` / `jpg` / `gif` / `webp` out of a data URI. ExcelJS rejects
    // anything it doesn't recognise so we filter unknown types upstream.
    const imageExtFromDataUrl = (dataUrl) => {
      const m = /^data:image\/(png|jpe?g|gif|webp);/i.exec(dataUrl || '');
      if (!m) return null;
      const ext = m[1].toLowerCase();
      return ext === 'jpeg' ? 'jpg' : ext;
    };

    // Resolve natural dimensions so we can preserve aspect ratio in the sheet.
    // Cached per data URI inside the generator to avoid re-decoding the same
    // screenshot when it appears in multiple annotation rows.
    const measureImage = (dataUrl) => new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => reject(new Error('Could not decode image'));
      img.src = dataUrl;
    });

    // Composite numbered markers onto an image at the annotation coordinates
    // and return a fresh PNG data URI. Markers render red filled circle + white
    // ring + white number, with a soft drop shadow so they read on busy
    // backgrounds. Matches the in-app marker styling.
    const burnAnnotations = (dataUrl, annotations) => new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          // Marker sizing scales with the smaller image dimension so it reads
          // well on both tiny icons and full-page screenshots.
          const minDim = Math.min(canvas.width, canvas.height);
          const radius = Math.max(14, minDim * 0.022);
          const ringWidth = Math.max(2, radius * 0.18);
          const fontSize = radius * 1.05;
          for (const a of annotations) {
            const x = Math.max(0, Math.min(100, a.x || 0)) / 100 * canvas.width;
            const y = Math.max(0, Math.min(100, a.y || 0)) / 100 * canvas.height;
            // Drop shadow for the filled disk so it sits on top of any background.
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.35)';
            ctx.shadowBlur = ringWidth * 2.5;
            ctx.shadowOffsetY = ringWidth * 0.5;
            ctx.fillStyle = '#ef4444'; // red-500, matches the in-app marker
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // White ring on top, no shadow.
            ctx.lineWidth = ringWidth;
            ctx.strokeStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
            // Number.
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(a.number), x, y);
          }
          resolve(canvas.toDataURL('image/png'));
        } catch (err) {
          reject(err);
        }
      };
      img.onerror = () => reject(new Error('Could not decode image for burn-in'));
      img.src = dataUrl;
    });

    // Build an XLSX Blob with embedded images. Row model mirrors the CSV
    // (one row per annotation, one row per image without annotations, one
    // row per feedback without media). Same image referenced from multiple
    // rows is added once via wb.addImage and anchored multiple times via
    // ws.addImage to keep the file lean.
    const generateXLSXBlob = async (data, author = '') => {
      const ExcelJS = window.ExcelJS;
      if (!ExcelJS) throw new Error('ExcelJS not loaded');
      const wb = new ExcelJS.Workbook();
      wb.creator = author || 'Feedback Compiler';
      wb.created = new Date();
      const ws = wb.addWorksheet('Feedback');
      ws.columns = [
        { header: 'Feedback #', width: 12 },
        { header: 'Title', width: 24 },
        { header: 'Overall feedback', width: 40 },
        { header: 'Media', width: 32 },
        { header: 'Type', width: 10 },
        { header: 'Annotation #', width: 14 },
        { header: 'Annotation', width: 40 },
        { header: 'Author', width: 14 },
        { header: 'Date', width: 12 },
      ];
      // Style the header row.
      const headerRow = ws.getRow(1);
      headerRow.font = { bold: true };
      headerRow.height = 22;
      headerRow.alignment = { vertical: 'middle' };

      // Default text wrapping + top alignment looks much better with images
      // and long annotation notes.
      const wrapAlign = { vertical: 'top', wrapText: true };

      // Per-media cache. We key by m.id (not m.dataUrl) because two media items
      // could theoretically share the same source dataUrl with different
      // annotation sets — keying by media id keeps each burned variant separate.
      // Each entry: { imageId, dims } resolved during the pre-pass below.
      const mediaImageMap = new Map();
      const annotatedMedia = [];
      data.forEach(fb => (fb.media || []).forEach(m => {
        if (m.type !== 'link' && m.dataUrl && imageExtFromDataUrl(m.dataUrl)) {
          annotatedMedia.push(m);
        }
      }));
      // For each image: burn markers in if it has annotations, then measure
      // dimensions, then register with the workbook. Run in parallel.
      await Promise.all(annotatedMedia.map(async (m) => {
        let effectiveUrl = m.dataUrl;
        let ext = imageExtFromDataUrl(m.dataUrl);
        if (m.annotations && m.annotations.length > 0) {
          try {
            effectiveUrl = await burnAnnotations(m.dataUrl, m.annotations);
            ext = 'png'; // canvas.toDataURL always produces PNG
          } catch { /* fall back to source on burn failure */ }
        }
        let dims = null;
        try { dims = await measureImage(effectiveUrl); } catch {}
        const imageId = wb.addImage({ base64: effectiveUrl, extension: ext });
        mediaImageMap.set(m.id, { imageId, dims });
      }));

      const TARGET_W = 200;
      const MAX_H = 140;
      const date = new Date().toLocaleDateString();

      data.forEach((fb, fbIdx) => {
        const num = String(fbIdx + 1).padStart(2, '0');
        const title = (fb.title || '').trim() || 'Untitled';
        const note = fb.overallNote || '';
        if (!fb.media || fb.media.length === 0) {
          const r = ws.addRow([num, title, note, '', '', '', '', author, date]);
          r.alignment = wrapAlign;
          return;
        }
        fb.media.forEach(m => {
          const isLink = m.type === 'link';
          const mediaType = isLink ? 'link' : 'image';
          const info = mediaImageMap.get(m.id);
          const annotations = (m.annotations && m.annotations.length) ? m.annotations : [null];
          annotations.forEach(a => {
            const aNum = a ? a.number : '';
            const aNote = a ? (a.note || '') : '';
            const row = ws.addRow([num, title, note, '', mediaType, aNum, aNote, author, date]);
            row.alignment = wrapAlign;
            const mediaCell = row.getCell(4);
            if (isLink && m.url) {
              mediaCell.value = { text: (m.name && m.name.trim()) || m.url, hyperlink: m.url };
              mediaCell.font = { color: { argb: 'FF0563C1' }, underline: 'single' };
            } else if (info) {
              const dims = info.dims;
              // Default to TARGET_W x MAX_H if we couldn't measure (will stretch slightly).
              let w = TARGET_W, h = MAX_H;
              if (dims) {
                const aspect = dims.h / dims.w;
                w = TARGET_W;
                h = TARGET_W * aspect;
                if (h > MAX_H) { h = MAX_H; w = MAX_H / aspect; }
              }
              // ExcelJS uses 0-indexed row/col; current row number is 1-indexed,
              // so we subtract 1 to get the top-left anchor.
              ws.addImage(info.imageId, {
                tl: { col: 3, row: row.number - 1 },
                ext: { width: w, height: h },
              });
              // Row height is in points (~px * 0.75). Add a small pad so the image
              // doesn't kiss the cell borders.
              row.height = Math.max(row.height || 0, (h + 8) * 0.75);
              mediaCell.value = m.name || '';
            } else {
              // Unknown / missing image — just show the filename text.
              mediaCell.value = m.name || '';
            }
          });
        });
      });

      const buffer = await wb.xlsx.writeBuffer();
      return new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    };

    const generateExportHTML = (data, author = '') => {
      const feedbacksHTML = data.map((fb, fbIdx) => {
        const mediaHTML = fb.media.map((m, mIdx) => {
          const scopeId = `f${fbIdx}-m${mIdx}`;
          const annotationsHTML = (m.annotations || []).map(a => `<div class="annotation-item" id="ann-${scopeId}-${a.number}"><div class="annotation-marker">${a.number}</div><div class="annotation-content"><div class="annotation-note">${escapeHtml(a.note)}</div></div></div>`).join('');

          let mediaContent = '';
          let headerIcon = '📷';
          if (m.type === 'image') {
            mediaContent = `<div class="media-wrapper"><img data-name="${escapeHtml(m.name)}" src="${m.dataUrl}" alt="${escapeHtml(m.name)}" />${m.annotations.map(a => `<a href="#ann-${scopeId}-${a.number}" class="marker" style="left: ${a.x}%; top: ${a.y}%;">${a.number}<span class="marker-tooltip">${escapeHtml(a.note)}</span></a>`).join('')}</div>`;
          } else if (m.type === 'link') {
            const info = providerInfo[m.provider];
            const embedUrl = getEmbedUrl(m.provider, m.url);
            const linkLabel = (m.name && m.name.trim()) || info.label;
            const linkBlock = embedUrl
              ? `<div class="link-embed"><iframe src="${escapeHtml(embedUrl)}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>`
              : `<div class="link-card"><div class="link-icon">${info.icon}</div><div class="link-label">${escapeHtml(linkLabel)}</div><div class="link-url">${escapeHtml(info.label)} · ${escapeHtml(m.url)}</div></div>`;
            mediaContent = `${linkBlock}<div class="link-footer"><span class="link-meta">${info.icon} ${escapeHtml(info.label)}</span><a href="${escapeHtml(m.url)}" target="_blank" rel="noopener noreferrer" class="link-open">Open in new tab ↗</a></div>`;
            headerIcon = '🔗';
          }

          const noteHTML = m.type === 'link' && m.note ? `<div class="item-note"><h4>Note</h4><p>${escapeHtml(m.note)}</p></div>` : '';
          const displayName = m.type === 'link' ? escapeHtml((m.name && m.name.trim()) || providerInfo[m.provider].label) : escapeHtml(m.name);

          return `<div class="media-block"><div class="media-header">${headerIcon} ${displayName}</div>${mediaContent}${noteHTML}${m.type === 'image' && m.annotations.length > 0 ? `<div class="annotations-list"><h4>Annotations (${m.annotations.length})</h4>${annotationsHTML}</div>` : ''}</div>`;
        }).join('');

        const fbIdAttr = escapeHtml(String(fb.id));
        return `<div class="feedback-section" data-feedback-id="${fbIdAttr}"><div class="feedback-header"><h2><span class="feedback-number">${String(fbIdx + 1).padStart(2, '0')}</span>${escapeHtml(displayTitle(fb))}</h2><div class="feedback-header-right"><button type="button" class="copy-prompt-btn" data-prompt-id="${fbIdAttr}" title="Copy a developer-ready summary of this feedback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span class="copy-label">Copy prompt</span></button><span class="feedback-date">${new Date(fb.createdAt).toLocaleString()}</span><label class="done-toggle"><input type="checkbox" class="done-checkbox" data-feedback-id="${fbIdAttr}" /><span class="done-box"><svg viewBox="0 0 16 16" aria-hidden="true"><polyline points="3 8.5 6.5 12 13 4.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Done</span></label></div></div>${fb.overallNote ? `<div class="overall-note"><h3>Feedback / Issue</h3><p>${escapeHtml(fb.overallNote)}</p></div>` : ''}${mediaHTML || '<p class="empty">No media attached</p>'}</div>`;
      }).join('');

      // Build prompts JSON keyed by feedback id. Escape < so any user-typed
      // closing-script sequence in notes can't terminate the embedded JSON block.
      const prompts = {};
      data.forEach(fb => { prompts[fb.id] = buildFeedbackPrompt(fb, author); });
      const promptsJson = JSON.stringify(prompts).replace(/</g, '\\u003c');

      return `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Feedback Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #09090b; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; border: 2px solid #09090b; }
::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
html { scrollbar-width: thin; scrollbar-color: #27272a #09090b; scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e4e4e7; line-height: 1.6; padding: 40px 20px; }
.container { max-width: 1000px; margin: 0 auto; }
.report-header { background: #18181b; color: #fafafa; padding: 40px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #27272a; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
.report-header h1 { font-size: 32px; margin-bottom: 8px; }
.report-header .meta { opacity: 0.6; font-size: 14px; color: #a1a1aa; }
.feedback-section { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.feedback-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; border-bottom: 1px solid #27272a; padding-bottom: 16px; margin-bottom: 20px; }
