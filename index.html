    function LinkViewer({ media, onRename }) {
      const info = providerInfo[media.provider];
      const embedUrl = getEmbedUrl(media.provider, media.url);
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(media.name || '');
      // Reset draft + exit edit mode whenever the active media item changes.
      useEffect(() => { setDraft(media.name || ''); setEditing(false); }, [media.id]);
      const providerLabel = info.label;
      const hasCustomName = (media.name || '').trim() && media.name.trim() !== providerLabel;
      const commit = () => {
        const next = draft.trim();
        if (next !== (media.name || '')) onRename && onRename(media.id, next || providerLabel);
        setEditing(false);
      };
      const cancel = () => { setDraft(media.name || ''); setEditing(false); };
      return (
        <div className="w-full max-w-3xl">
          {embedUrl ? (
            <div className="w-full bg-black rounded shadow-2xl overflow-hidden" style={{ aspectRatio: '16 / 9' }}>
              <iframe src={embedUrl} className="w-full h-full border-0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen title={info.label} />
            </div>
          ) : (
            <div className="w-full bg-zinc-900 border border-zinc-800 rounded p-8 text-center">
              <div className="text-5xl mb-3">{info.icon}</div>
              {editing ? (
                <input
                  autoFocus
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') { e.preventDefault(); commit(); }
                    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
                  }}
                  onBlur={commit}
                  onFocus={(e) => e.target.select()}
                  placeholder={providerLabel}
                  className="text-base font-bold text-zinc-100 bg-zinc-950 border border-zinc-700 rounded px-2.5 py-1 outline-none focus:border-zinc-400 focus:ring-1 focus:ring-zinc-400/30 text-center w-full max-w-md mx-auto block"
                />
              ) : (
                <div
                  onClick={() => setEditing(true)}
                  title="Click to rename"
                  className={`text-base font-bold cursor-text hover:bg-zinc-800/50 rounded px-2 py-1 mx-auto inline-block max-w-md break-words ${hasCustomName ? 'text-zinc-100' : 'text-zinc-400 italic font-normal'}`}
                >
                  {hasCustomName ? media.name : `${providerLabel} (click to rename)`}
                </div>
              )}
              <div className="text-xs text-zinc-500 mt-2 mb-4 break-all max-w-md mx-auto">
                <span className="uppercase tracking-wide font-semibold">{providerLabel}</span>
                <span className="mx-1.5 text-zinc-700">·</span>
                <span>{media.url}</span>
              </div>
              <a href={media.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 px-4 py-2 bg-zinc-100 hover:bg-white text-zinc-900 rounded text-sm font-semibold transition">
                <ExternalLink size={14} />Open in new tab
              </a>
            </div>
          )}
          {embedUrl && (
            <div className="mt-2 flex items-center justify-between text-xs">
              <div className="flex items-center gap-2 text-zinc-500 min-w-0">
                <span>{info.icon}</span><span>{providerLabel}</span><span className="truncate">· {hasCustomName ? media.name : media.url}</span>
              </div>
              <a href={media.url} target="_blank" rel="noopener noreferrer" className="text-zinc-400 hover:text-zinc-200 inline-flex items-center gap-1 transition flex-shrink-0">
                <ExternalLink size={12} />Open
              </a>
            </div>
          )}
        </div>
      );
    }

    function FeedbackPlatform() {
      // Filter out legacy video items and normalize each remaining media item
      // so callers can rely on `media[i].annotations` being an array and
      // `media[i].note` being a string without per-call defensive checks.
      const sanitizeFeedbacks = (list) => {
        if (!Array.isArray(list)) return [];
        return list.map(fb => ({
          ...fb,
          media: Array.isArray(fb.media)
            ? fb.media
                .filter(m => m && m.type !== 'video')
                .map(m => ({
                  ...m,
                  annotations: Array.isArray(m.annotations) ? m.annotations : [],
                  note: typeof m.note === 'string' ? m.note : '',
                }))
            : [],
        }));
      };

      // Read & parse localStorage exactly once on mount.
      const initialFeedbacksRef = useRef(null);
      if (initialFeedbacksRef.current === null) {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          const parsed = saved ? JSON.parse(saved) : null;
          initialFeedbacksRef.current = sanitizeFeedbacks(parsed);
        } catch (e) {
          console.warn('Failed to load saved data:', e);
          initialFeedbacksRef.current = [];
        }
      }
      const initial = initialFeedbacksRef.current;

      const [feedbacks, setFeedbacks] = useState(initial);
      const [activeFeedbackId, setActiveFeedbackId] = useState(() => initial[0]?.id || null);
      const [activeMediaId, setActiveMediaId] = useState(() => initial[0]?.media?.[0]?.id || null);
      const [annotationMode, setAnnotationMode] = useState(false);
      const [currentAnnotation, setCurrentAnnotation] = useState(null);
      const [annotationNote, setAnnotationNote] = useState('');
      const [editingAnnotationId, setEditingAnnotationId] = useState(null);
      const [editingNote, setEditingNote] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [showAnnotations, setShowAnnotations] = useState(false);
      const [annotationsClosing, setAnnotationsClosing] = useState(false);
      const [bottomCollapsed, setBottomCollapsed] = useState(false);
      const [showPreview, setShowPreview] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [showExportMenu, setShowExportMenu] = useState(false);
      // Only meaningful at mobile widths; on desktop the sidebar is always
      // visible via Tailwind's md: utilities regardless of this value.
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [storageStatus, setStorageStatus] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [linkUrl, setLinkUrl] = useState('');
      const [showLinkInput, setShowLinkInput] = useState(false);
      const [linkInputClosing, setLinkInputClosing] = useState(false);
      const [showTitleSuggestions, setShowTitleSuggestions] = useState(false);
      const [highlightedSuggestion, setHighlightedSuggestion] = useState(-1);
      const [showAnnotateTip, setShowAnnotateTip] = useState(false);
      const [showPreviewTip, setShowPreviewTip] = useState(false);
      const [linkDropHover, setLinkDropHover] = useState(false);
      const [editingNameId, setEditingNameId] = useState(null);
      const [editingNameValue, setEditingNameValue] = useState('');
      const [editingTitleId, setEditingTitleId] = useState(null);
      const [editingTitleValue, setEditingTitleValue] = useState('');
      const [authorName, setAuthorNameState] = useState(() => {
        try { return localStorage.getItem(AUTHOR_KEY) || ''; } catch { return ''; }
      });
      // Persists every change to localStorage. Cheap to do synchronously
      // on each keystroke since the value is small.
      const setAuthorName = (name) => {
        setAuthorNameState(name);
        try { localStorage.setItem(AUTHOR_KEY, name); } catch {}
      };
      const [theme, setThemeState] = useState(() => {
        try { return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; } catch { return 'dark'; }
      });
      const setTheme = (next) => {
        setThemeState(next);
        try { localStorage.setItem(THEME_KEY, next); } catch {}
      };
      const [authorNudgeDismissed, setAuthorNudgeDismissed] = useState(false);
      const [nameNudgeDraft, setNameNudgeDraft] = useState('');
      const [tipIndex, setTipIndex] = useState(0);

      // First-run coach-marks. Both only fire when the session began with no
      // feedbacks (a true fresh load). Refs gate re-firing within the session.
      const startedEmptyRef = useRef(initial.length === 0);
      const annotateTipShownRef = useRef(false);
      const previewTipShownRef = useRef(false);

      const dragCounter = useRef(0);
      const fileInputRef = useRef(null);
      const importFileRef = useRef(null);
      const imageRef = useRef(null);
      const addFilesRef = useRef(null);
      const addLinkRef = useRef(null);
      const menuRef = useRef(null);
      const exportMenuRef = useRef(null);
      const linkInputRef = useRef(null);
      const overallNoteRef = useRef(null);
      const titleInputRef = useRef(null);
      const focusTitleOnNextRender = useRef(false);

      const activeFeedback = feedbacks.find(f => f.id === activeFeedbackId);
      const activeMedia = activeFeedback?.media.find(m => m.id === activeMediaId);
      const annotationCount = activeMedia?.annotations?.length || 0;

      // Build the list of title suggestions for the title input.
      // - Skip the active feedback's own title
      // - Skip empties and exact-match (case-insensitive) duplicates
      // - When input is empty: show all past titles; when typing: substring match
      // - Newest first, capped at 6
      const titleSuggestions = (() => {
        const currentLower = (activeFeedback?.title || '').trim().toLowerCase();
        const seen = new Set();
        const out = [];
        for (let i = feedbacks.length - 1; i >= 0 && out.length < 6; i--) {
          const f = feedbacks[i];
          if (f.id === activeFeedbackId) continue;
          const t = (f.title || '').trim();
          if (!t) continue;
          const lower = t.toLowerCase();
          if (seen.has(lower)) continue;
          if (lower === currentLower) continue;
          if (currentLower && !lower.includes(currentLower)) continue;
          seen.add(lower);
          out.push(t);
        }
        return out;
      })();

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(feedbacks)); }
        catch (e) { if (e.name === 'QuotaExceededError' || e.code === 22) setStorageStatus({ type: 'error', message: 'Storage full — auto-save failed. Export your session to back up your work.' }); }
      }, [feedbacks]);

      useEffect(() => { if (storageStatus) { const t = setTimeout(() => setStorageStatus(null), 6000); return () => clearTimeout(t); } }, [storageStatus]);

      useEffect(() => {
        if (!showMenu) return;
        const h = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, [showMenu]);

      useEffect(() => {
        if (!showExportMenu) return;
        const h = (e) => { if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) setShowExportMenu(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, [showExportMenu]);

      // Click anywhere outside the Paste-URL field closes it (same as Cancel).
      // Desktop-only: click anywhere outside the inline Paste-URL field closes
      // it. On mobile the field is a bottom-sheet popup with its own backdrop,
      // so this handler is skipped.
      useEffect(() => {
        if (!showLinkInput) return;
        const h = (e) => {
          if (window.matchMedia('(max-width: 767px)').matches) return;
          if (linkInputRef.current && !linkInputRef.current.contains(e.target)) setShowLinkInput(false);
        };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, [showLinkInput]);

      // Apply the theme attribute to <html> so every element (including the
      // root container itself, which can't be matched by a descendant selector
      // on itself) is in scope of the [data-theme="light"] override rules.
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      // Rotate the sidebar tip every 4s. Only runs when there's at least one
      // feedback — the tip block isn't rendered otherwise.
      useEffect(() => {
        if (feedbacks.length === 0) return;
        const id = setInterval(() => setTipIndex(i => i + 1), 4000);
        return () => clearInterval(id);
      }, [feedbacks.length]);

      // Reset all transient annotation state when switching media so a pending or
      // in-progress edit from one item doesn't leak into another.
      useEffect(() => {
        setShowAnnotations(false);
        setCurrentAnnotation(null);
        setAnnotationNote('');
        setEditingAnnotationId(null);
        setEditingNote('');
        setEditingNameId(null);
        setEditingNameValue('');
      }, [activeMediaId]);
      useEffect(() => { addFilesRef.current = addFiles; });
      useEffect(() => { addLinkRef.current = addLink; });

      useEffect(() => {
        const handlePaste = async (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          const cd = e.clipboardData || window.clipboardData;
          if (!cd) return;
          let files = [];
          if (cd.files?.length > 0) files = Array.from(cd.files);
          if (files.length === 0 && cd.items) {
            files = Array.from(cd.items).filter(i => i.kind === 'file').map(i => i.getAsFile()).filter(Boolean);
          }
          // Only intercept the paste if there's something we care about; let
          // addFiles surface the video-related message and filter to images.
          const relevant = files.filter(f => isImageType(f.type) || isVideoFile(f));
          if (relevant.length && addFilesRef.current) { e.preventDefault(); await addFilesRef.current(relevant); return; }

          // If clipboard text is a clean URL on its own line (e.g. a Google
          // Drive / Loom / YouTube share link), treat the paste as "add this
          // link to current feedback (or create a new one)". Multi-word pastes
          // and stray text aren't intercepted so normal paste behaviour stays.
          // When the clipboard ALSO carries an <a> tag (some apps put both
          // text/plain and text/html on the clipboard — e.g. copying a
          // hyperlinked phrase), use the link text as the initial title.
          const text = (cd.getData ? cd.getData('text/plain') : '').trim();
          if (/^https?:\/\/\S+$/i.test(text) && addLinkRef.current) {
            e.preventDefault();
            let title = '';
            const html = cd.getData ? cd.getData('text/html') : '';
            if (html) {
              // Pull the first <a>…</a> body, then strip nested tags. Use it
              // only if it's a meaningful label (non-empty, not just the URL).
              const m = html.match(/<a[^>]*>([\s\S]+?)<\/a>/i);
              if (m) {
                const candidate = m[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
                if (candidate && candidate !== text) title = candidate;
              }
            }
            addLinkRef.current(text, title);
          }
        };
        document.addEventListener('paste', handlePaste);
        return () => document.removeEventListener('paste', handlePaste);
      }, []);

      // Global keyboard shortcuts for non-destructive overlays. The confirm
      // dialog intentionally does NOT respond to keys — destructive actions
      // require an explicit mouse click on the button.
      useEffect(() => {
        const onKey = (e) => {
          if (e.key !== 'Escape') return;
          if (showExportMenu) { setShowExportMenu(false); return; }
          if (showPreview) { setShowPreview(false); return; }
          if (showMenu) { setShowMenu(false); return; }
        };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [showPreview, showMenu, showExportMenu]);

      // Focus the title input when a new feedback is created.
      useEffect(() => {
        if (focusTitleOnNextRender.current && titleInputRef.current) {
          focusTitleOnNextRender.current = false;
          titleInputRef.current.focus();
          titleInputRef.current.select();
        }
      });

      // Show the Annotate tooltip the first time an image becomes active in a
      // session that started empty. Won't re-fire even if user switches media.
      useEffect(() => {
        if (!startedEmptyRef.current || annotateTipShownRef.current) return;
        if (activeMedia?.type !== 'image') return;
        annotateTipShownRef.current = true;
        setShowAnnotateTip(true);
      }, [activeMedia?.id, activeMedia?.type]);

      // Show the Preview & Export tooltip once the user has content worth
      // exporting: their first annotation, or a link (since links can't be
      // annotated, that's the cue for link-only users). Waits for the
      // Annotate tip to clear so the two don't overlap.
      useEffect(() => {
        if (!startedEmptyRef.current || previewTipShownRef.current) return;
        if (showAnnotateTip) return;
        let totalAnnotations = 0;
        let hasLink = false;
        for (const f of feedbacks) {
          for (const m of (f.media || [])) {
            if (m.type === 'link') hasLink = true;
            totalAnnotations += m.annotations?.length || 0;
          }
        }
        if (totalAnnotations === 0 && !hasLink) return;
        previewTipShownRef.current = true;
        setShowPreviewTip(true);
      }, [feedbacks, showAnnotateTip]);

      const createFeedback = () => {
        const fb = { id: uid(), title: '', overallNote: '', media: [], createdAt: new Date().toISOString() };
        setFeedbacks(prev => [...prev, fb]);
        setActiveFeedbackId(fb.id);
        setActiveMediaId(null);
        setBottomCollapsed(false);
        focusTitleOnNextRender.current = true;
      };

      const deleteFeedback = (id) => {
        const target = feedbacks.find(f => f.id === id);
        if (!target) return;
        const mediaCount = target.media.length;
        const totalAnnotations = target.media.reduce((s, m) => s + m.annotations.length, 0);
        const noteCount = (target.overallNote ? 1 : 0) + target.media.filter(m => m.note).length;
        const parts = [];
        if (mediaCount > 0) parts.push(`${mediaCount} media item${mediaCount === 1 ? '' : 's'}`);
        if (totalAnnotations > 0) parts.push(`${totalAnnotations} annotation${totalAnnotations === 1 ? '' : 's'}`);
        if (noteCount > 0) parts.push(`${noteCount} note${noteCount === 1 ? '' : 's'}`);

        const doDelete = () => {
          setFeedbacks(prev => {
            const next = prev.filter(f => f.id !== id);
            if (activeFeedbackId === id) {
              setActiveFeedbackId(next[0]?.id || null);
              setActiveMediaId(null);
            }
            return next;
          });
          setConfirmDialog(null);
        };

        if (parts.length === 0) { doDelete(); return; }
        setConfirmDialog({ title: 'Delete feedback?', message: `This will permanently delete "${displayTitle(target)}" along with ${parts.join(', ')}. This cannot be undone.`, confirmLabel: 'Delete', danger: true, onConfirm: doDelete });
      };

      const updateFeedback = (id, updates) => setFeedbacks(prev => prev.map(f => f.id === id ? { ...f, ...updates } : f));
      const updateActiveMedia = (mu) => setFeedbacks(prev => prev.map(f => f.id === activeFeedbackId ? { ...f, media: mu(f.media) } : f));

      // Returns [targetFeedbackId, workingFeedbacksArray]. If there's no active feedback,
      // creates a new one and returns the extended array (caller must use it instead of `feedbacks`
      // because the state update from setActiveFeedbackId hasn't been applied yet).
      const ensureActiveFeedback = () => {
        if (activeFeedbackId) return [activeFeedbackId, feedbacks];
        const nf = { id: uid(), title: '', overallNote: '', media: [], createdAt: new Date().toISOString() };
        setActiveFeedbackId(nf.id);
        return [nf.id, [...feedbacks, nf]];
      };

      const addFiles = async (files) => {
        if (files.some(isVideoFile)) {
          setStorageStatus({ type: 'info', message: 'Hosting your video in Google Drive, Loom, YouTube, or another service is recommended 😬' });
        }
        const mfs = files.filter(f => isImageType(f.type));
        if (!mfs.length) return;
        const [tid, wf] = ensureActiveFeedback();
        const nm = await Promise.all(mfs.map(buildMediaItem));
        setFeedbacks(wf.map(f => f.id === tid ? { ...f, media: [...f.media, ...nm] } : f));
        if (nm.length > 0) setActiveMediaId(nm[0].id);
        setShowLinkInput(false);
      };

      const handleFileUpload = async (e) => { const fs = Array.from(e.target.files); if (fs.length) await addFiles(fs); e.target.value = ''; };

      const addLink = (rawUrl, title) => {
        const t = (rawUrl || '').trim();
        if (!t) return;
        let url = t;
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        try { new URL(url); } catch { setStorageStatus({ type: 'error', message: 'That doesn\'t look like a valid URL.' }); return; }

        const [tid, wf] = ensureActiveFeedback();
        const nl = buildLinkItem(url, title);
        setFeedbacks(wf.map(f => f.id === tid ? { ...f, media: [...f.media, nl] } : f));
        setActiveMediaId(nl.id);
        setLinkUrl('');
      };

      const deleteMedia = (mid) => {
        const list = activeFeedback?.media || [];
        const idx = list.findIndex(m => m.id === mid);
        if (idx === -1) return;
        updateActiveMedia(m => m.filter(x => x.id !== mid));
        if (activeMediaId !== mid) return;
        // Pick the item that will slide up to the same index. If we just
        // removed the last one, fall back to the new last. Empty → null.
        const survivors = list.filter(x => x.id !== mid);
        setActiveMediaId(survivors.length ? survivors[Math.min(idx, survivors.length - 1)].id : null);
      };
      const updateMediaNote = (mid, note) => updateActiveMedia(m => m.map(x => x.id === mid ? { ...x, note } : x));
      const updateMediaName = (mid, name) => updateActiveMedia(m => m.map(x => x.id === mid ? { ...x, name } : x));

      // Split a filename into [base, extension]. Leading-dot files (e.g. .gitignore)
      // are treated as having no extension to avoid eating their whole name.
      const splitExt = (name) => {
        const idx = (name || '').lastIndexOf('.');
        if (idx <= 0) return [name || '', ''];
        return [name.slice(0, idx), name.slice(idx)];
      };

      const startNameEdit = (mid, currentName) => {
        const [base] = splitExt(currentName);
        setEditingNameId(mid);
        setEditingNameValue(base);
      };
      const commitNameEdit = () => {
        if (!editingNameId) return;
        const target = activeFeedback?.media.find(m => m.id === editingNameId);
        if (target) {
          const [, ext] = splitExt(target.name || '');
          const trimmed = editingNameValue.trim();
          if (trimmed.length > 0) {
            updateMediaName(editingNameId, trimmed + ext);
          }
        }
        setEditingNameId(null);
        setEditingNameValue('');
      };
      const cancelNameEdit = () => {
        setEditingNameId(null);
        setEditingNameValue('');
      };

      // Inline rename for a feedback's title from the sidebar list.
      // Empty values are allowed — the row falls back to "Untitled" italic placeholder.
      const startTitleEdit = (fid, currentTitle) => {
        setEditingTitleId(fid);
        setEditingTitleValue(currentTitle || '');
      };
      const commitTitleEdit = () => {
        if (!editingTitleId) return;
        updateFeedback(editingTitleId, { title: editingTitleValue });
        setEditingTitleId(null);
        setEditingTitleValue('');
      };
      const cancelTitleEdit = () => {
        setEditingTitleId(null);
        setEditingTitleValue('');
      };

      // User-initiated close for the annotations panel. On mobile (where the
      // panel is a bottom-sheet drawer), we play the slide-down animation
      // before unmounting; on desktop the panel is part of the row flex flow
      // so it just disappears. Guard against double-fire while animating.
      const closeAnnotations = () => {
        if (annotationsClosing) return;
        if (typeof window !== 'undefined' && window.matchMedia('(min-width: 768px)').matches) {
          setShowAnnotations(false);
          return;
        }
        setAnnotationsClosing(true);
        setTimeout(() => {
          setShowAnnotations(false);
          setAnnotationsClosing(false);
        }, 240);
      };

      // Same animated-close pattern for the "Paste link" UI. On mobile this is
      // a bottom-sheet popup (because the inline column is too narrow to fit
      // an editable URL); on desktop it stays inline and closes instantly.
      const closeLinkInput = () => {
        if (linkInputClosing) return;
        if (typeof window !== 'undefined' && window.matchMedia('(min-width: 768px)').matches) {
          setShowLinkInput(false);
          return;
        }
        setLinkInputClosing(true);
        setTimeout(() => {
          setShowLinkInput(false);
          setLinkInputClosing(false);
        }, 240);
      };

      const handleImageClick = (e) => {
        if (!annotationMode || activeMedia?.type !== 'image') return;
        const r = imageRef.current.getBoundingClientRect();
        setCurrentAnnotation({ x: ((e.clientX - r.left) / r.width) * 100, y: ((e.clientY - r.top) / r.height) * 100, type: 'image' });
        setAnnotationNote('');
        // Starting a new annotation cancels any in-progress edit so the panel
        // doesn't end up with two open compose surfaces at once.
        setEditingAnnotationId(null);
        setEditingNote('');
        setShowAnnotations(true);
      };

      const saveAnnotation = () => {
        if (!annotationNote.trim() || !currentAnnotation) return;
        const number = nextAnnotationNumber(activeMedia.annotations);
        const na = { id: uid(), ...currentAnnotation, note: annotationNote, number };
        updateActiveMedia(m => m.map(x => x.id === activeMediaId ? { ...x, annotations: [...x.annotations, na] } : x));
        setCurrentAnnotation(null); setAnnotationNote('');
      };

      const deleteAnnotation = (aid) => updateActiveMedia(m => m.map(x => {
        if (x.id !== activeMediaId) return x;
        // Renumber survivors so the list stays 1..N with no gaps.
        const renumbered = x.annotations.filter(a => a.id !== aid).map((a, i) => ({ ...a, number: i + 1 }));
        return { ...x, annotations: renumbered };
      }));

      const startEditAnnotation = (a) => { setEditingAnnotationId(a.id); setEditingNote(a.note); };
      const saveEditAnnotation = () => {
        if (!editingNote.trim() || editingAnnotationId == null) return;
        updateActiveMedia(m => m.map(x => x.id === activeMediaId ? { ...x, annotations: x.annotations.map(a => a.id === editingAnnotationId ? { ...a, note: editingNote } : a) } : x));
        setEditingAnnotationId(null); setEditingNote('');
      };
      const cancelEditAnnotation = () => { setEditingAnnotationId(null); setEditingNote(''); };

      // Window-level capture-phase drag handlers. Required because cross-origin
      // iframes (Loom, YouTube, etc.) can claim drag events before they bubble
      // to our outer container — so listening on the outer div alone misses
      // drops over the iframe area. Capture phase fires at window before any
      // descendant gets a shot, and the file-type filter avoids interfering
      // with in-page drags (text, etc.).
      useEffect(() => {
        const isFileDrag = (e) => e.dataTransfer?.types?.includes('Files');
        const onEnter = (e) => {
          if (!isFileDrag(e)) return;
          e.preventDefault();
          dragCounter.current++;
          setIsDragging(true);
        };
        const onLeave = (e) => {
          if (!isFileDrag(e)) return;
          e.preventDefault();
          dragCounter.current--;
          // relatedTarget null means cursor truly left the window — force reset.
          if (e.relatedTarget === null || dragCounter.current <= 0) {
            dragCounter.current = 0;
            setIsDragging(false);
          }
        };
        const onOver = (e) => {
          if (!isFileDrag(e)) return;
          e.preventDefault();
        };
        const onDrop = async (e) => {
          if (!isFileDrag(e)) return;
          e.preventDefault();
          e.stopPropagation();
          dragCounter.current = 0;
          setIsDragging(false);
          setLinkDropHover(false);
          const files = Array.from(e.dataTransfer.files);
          if (files.length && addFilesRef.current) await addFilesRef.current(files);
        };
        window.addEventListener('dragenter', onEnter, true);
        window.addEventListener('dragleave', onLeave, true);
        window.addEventListener('dragover', onOver, true);
        window.addEventListener('drop', onDrop, true);
        return () => {
          window.removeEventListener('dragenter', onEnter, true);
          window.removeEventListener('dragleave', onLeave, true);
          window.removeEventListener('dragover', onOver, true);
          window.removeEventListener('drop', onDrop, true);
        };
      }, []);

      const exportHTML = () => { try { downloadFile(generateExportHTML(feedbacks, authorName), `feedback-report-${todayStr()}${authorSuffix(authorName)}.html`, 'text/html;charset=utf-8'); } catch (err) { setStorageStatus({ type: 'error', message: 'Export failed: ' + err.message }); } };
      const exportCSV = () => { try { downloadFile(generateExportCSV(feedbacks, authorName), `feedback-report-${todayStr()}${authorSuffix(authorName)}.csv`, 'text/csv;charset=utf-8'); } catch (err) { setStorageStatus({ type: 'error', message: 'Export failed: ' + err.message }); } };
      // XLSX export is async — the ExcelJS lib lazy-loads from CDN on first
      // click and the image-embedding pass measures each unique screenshot.
      const exportXLSX = async () => {
        try {
          setStorageStatus({ type: 'info', message: 'Preparing XLSX…' });
          await loadExcelJS();
          const blob = await generateXLSXBlob(feedbacks, authorName);
          downloadFile(blob, `feedback-report-${todayStr()}${authorSuffix(authorName)}.xlsx`);
          setStorageStatus({ type: 'success', message: 'XLSX downloaded' });
        } catch (err) {
          setStorageStatus({ type: 'error', message: 'XLSX export failed: ' + err.message });
        }
      };

      const exportSession = () => {
        try {
          const json = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), feedbacks }, null, 2);
          downloadFile(json, `feedback-session-${todayStr()}${authorSuffix(authorName)}.json`, 'application/json');
          setShowMenu(false);
        } catch (err) { setStorageStatus({ type: 'error', message: 'Session export failed: ' + err.message }); }
      };

      const handleImportSession = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            const rawImp = Array.isArray(data) ? data : data.feedbacks;
            if (!Array.isArray(rawImp)) throw new Error('Invalid file format');
            const droppedVideos = rawImp.reduce((s, fb) => s + (Array.isArray(fb.media) ? fb.media.filter(m => m.type === 'video').length : 0), 0);
            const imp = sanitizeFeedbacks(rawImp);
            const doImport = () => {
              setFeedbacks(imp);
              setActiveFeedbackId(imp[0]?.id || null);
              setActiveMediaId(imp[0]?.media?.[0]?.id || null);
              const msg = droppedVideos > 0
                ? `Imported ${imp.length} feedback item${imp.length === 1 ? '' : 's'} (skipped ${droppedVideos} video${droppedVideos === 1 ? '' : 's'} — no longer supported)`
                : `Imported ${imp.length} feedback item${imp.length === 1 ? '' : 's'}`;
              setStorageStatus({ type: 'success', message: msg });
              setConfirmDialog(null);
            };
            if (feedbacks.length === 0) doImport();
            else setConfirmDialog({ title: 'Replace current session?', message: `Importing will replace your current ${feedbacks.length} feedback item${feedbacks.length === 1 ? '' : 's'} with ${imp.length} from the file.`, confirmLabel: 'Replace', danger: true, onConfirm: doImport });
          } catch (err) { setStorageStatus({ type: 'error', message: 'Failed to import: ' + err.message }); }
        };
        reader.readAsText(file);
        e.target.value = '';
        setShowMenu(false);
      };

      const clearAllData = () => {
        if (feedbacks.length === 0) { setShowMenu(false); return; }
        setShowMenu(false);
        setConfirmDialog({
          title: 'Clear all data?',
          message: `This will delete all ${feedbacks.length} feedback item${feedbacks.length === 1 ? '' : 's'} permanently. Consider exporting your session first as a backup.`,
          confirmLabel: 'Clear all',
          danger: true,
          onConfirm: () => {
            setFeedbacks([]);
            setActiveFeedbackId(null);
            setActiveMediaId(null);
            setStorageStatus({ type: 'success', message: 'All feedback cleared' });
            setConfirmDialog(null);
          },
        });
      };

      // Only regenerate the report HTML when feedbacks change AND the preview is open.
      // This avoids re-stringifying every image data URL on unrelated re-renders.
      const previewHtml = useMemo(
        () => showPreview ? generateExportHTML(feedbacks, authorName) : '',
        [showPreview, feedbacks, authorName]
      );

      const handleZonePaste = async (e) => {
        const items = Array.from(e.clipboardData?.items || []);
        const files = items.filter(i => i.kind === 'file').map(i => i.getAsFile()).filter(Boolean);
        const relevant = files.filter(f => isImageType(f.type) || isVideoFile(f));
        if (relevant.length) await addFiles(relevant);
      };

      return (
        <div className="flex flex-col md:flex-row h-[100dvh] bg-zinc-950 text-zinc-100 relative">
          {/* Mobile top bar — stays at the top of the column layout so the menu
              button has its own row and never overlaps content beneath. Desktop
              shows the sidebar header instead. */}
          <div className="md:hidden flex-shrink-0 h-12 bg-zinc-900 border-b border-zinc-800 px-3 flex items-center gap-2 relative z-20">
            <button
              onClick={() => setSidebarOpen(true)}
              aria-label="Open menu"
              className="p-1.5 -ml-1 rounded text-zinc-300 hover:bg-zinc-800 transition"
            >
              <Menu size={18} />
            </button>
            <h1 className="text-sm font-bold text-zinc-100">Feedback Compiler</h1>
          </div>
          {/* Mobile backdrop — tap outside the drawer to close it. */}
          {sidebarOpen && (
            <div
              className="md:hidden fixed inset-0 z-30 bg-black/50"
              onClick={() => setSidebarOpen(false)}
            />
          )}
          {isDragging && (
            <div className="absolute inset-0 z-50 bg-zinc-100/15 backdrop-blur-sm flex items-center justify-center">
              <div className="bg-zinc-900 rounded-lg shadow-2xl p-10 border-4 border-dashed border-zinc-300 pointer-events-none">
                <Download size={56} className="text-zinc-200 mx-auto mb-4" />
                <h2 className="text-2xl font-bold text-zinc-100 mb-1 text-center">Drop your screenshots here</h2>
                <p className="text-zinc-400 text-center">Files will be added to {activeFeedback ? `"${displayTitle(activeFeedback)}"` : 'a new feedback'}</p>
              </div>
            </div>
          )}

          {storageStatus && (
            <div className={`absolute bottom-4 right-4 z-50 max-w-xs pl-3 pr-2 py-2 rounded text-xs shadow-2xl border flex items-start gap-2 animate-toast-in ${storageStatus.type === 'error' ? 'bg-red-500/20 border-red-500/40 text-red-300' : 'bg-zinc-100/10 border-zinc-700 text-zinc-200'}`}>
              <span className="flex-1 pt-0.5">{storageStatus.message}</span>
              <button onClick={() => setStorageStatus(null)} className={`flex-shrink-0 p-1 rounded transition ${storageStatus.type === 'error' ? 'hover:bg-red-500/20 text-red-300/70 hover:text-red-200' : 'hover:bg-zinc-100/10 text-zinc-400 hover:text-zinc-100'}`} title="Dismiss">
                <X size={12} />
              </button>
            </div>
          )}

          {confirmDialog && (
            <div className="absolute inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
              <div className="bg-zinc-900 border border-zinc-800 rounded-lg shadow-2xl max-w-md w-full p-5">
                <h3 className="text-base font-semibold text-zinc-100 mb-2">{confirmDialog.title}</h3>
                <p className="text-sm text-zinc-400 mb-5 leading-relaxed">{confirmDialog.message}</p>
                <div className="flex items-center justify-end gap-2">
                  <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded text-sm font-medium transition">Cancel</button>
                  <button onClick={confirmDialog.onConfirm} className={`px-4 py-2 rounded text-sm font-semibold transition ${confirmDialog.danger ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-zinc-100 hover:bg-white text-zinc-900'}`}>{confirmDialog.confirmLabel || 'Confirm'}</button>
                </div>
              </div>
            </div>
          )}

          {/* Mobile-only link-input bottom sheet — lives at the root so its
              fixed positioning escapes the sub-panel's sticky stacking context
              and renders above the Feedback Details bottom panel. */}
          {showLinkInput && (
            <>
              <div className="md:hidden fixed inset-0 z-50 bg-black/60" onClick={closeLinkInput} />
              <div className={`md:hidden fixed inset-x-0 bottom-0 z-50 bg-zinc-900 border-t border-zinc-800 rounded-t-lg pt-2 pb-5 px-5 shadow-2xl ${linkInputClosing ? 'animate-slide-down' : 'animate-slide-up'}`}>
                <div className="flex justify-center pb-2">
                  <div className="w-10 h-1 rounded-full bg-zinc-700" />
                </div>
                <div className="text-sm font-semibold text-zinc-100 mb-3">Paste link</div>
                <input
                  autoFocus
                  type="text"
                  value={linkUrl}
                  onChange={(e) => setLinkUrl(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') { e.preventDefault(); if (linkUrl.trim()) { addLink(linkUrl); closeLinkInput(); } }
                    else if (e.key === 'Escape') { e.preventDefault(); closeLinkInput(); }
                  }}
                  placeholder="https://..."
                  className="w-full text-base bg-zinc-950 text-zinc-100 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/30 placeholder:text-zinc-600"
                />
                <div className="flex gap-2 mt-4">
                  <button onClick={closeLinkInput} className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-2.5 rounded text-sm font-medium transition">Cancel</button>
                  <button onClick={() => { if (linkUrl.trim()) { addLink(linkUrl); closeLinkInput(); } }} disabled={!linkUrl.trim()} className="flex-1 bg-zinc-100 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-zinc-900 py-2.5 rounded text-sm font-semibold transition">Add</button>
                </div>
              </div>
            </>
          )}

          {showPreview && (
            <div className="absolute inset-0 z-40 bg-black/70 backdrop-blur-sm flex flex-col">
              <div className="bg-zinc-900 border-b border-zinc-800 px-4 md:px-5 py-3 flex flex-col md:flex-row md:items-center md:justify-between gap-2 md:gap-3 flex-shrink-0">
                <div className="min-w-0">
                  <h2 className="text-base font-semibold text-zinc-100">Preview Report</h2>
                  <p className="text-xs text-zinc-500 mt-0.5 hidden md:block">Review before exporting. Close to make changes.</p>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => setShowPreview(false)} className="flex-1 md:flex-initial justify-center md:justify-start px-3 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded text-sm font-medium flex items-center gap-1.5 transition"><X size={14} />Close</button>
                  <div className="relative flex-1 md:flex-initial" ref={exportMenuRef}>
                    <button onClick={() => setShowExportMenu(v => !v)} aria-haspopup="menu" aria-expanded={showExportMenu} className="w-full md:w-auto justify-center md:justify-start px-4 py-2 bg-zinc-100 hover:bg-white text-zinc-900 rounded text-sm font-semibold flex items-center gap-1.5 transition shadow-lg">
                      <Download size={14} />Export <ChevronDown size={14} className={`transition-transform ${showExportMenu ? 'rotate-180' : ''}`} />
                    </button>
                    {showExportMenu && (
                      <div role="menu" className="absolute right-0 top-full mt-2 w-[18rem] sm:w-80 max-w-[calc(100vw-1.5rem)] bg-zinc-900 border border-zinc-800 rounded-lg shadow-2xl z-30 py-1 overflow-hidden">
                        <button role="menuitem" onClick={() => { setShowExportMenu(false); exportHTML(); }} className="w-full px-3 py-3 text-left hover:bg-zinc-800 flex items-start gap-3 transition">
                          <Download size={16} className="text-[#3f8efc] mt-0.5 flex-shrink-0" />
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2">
                              <div className="text-sm font-semibold text-zinc-100">HTML Report</div>
                              <span className="text-[9px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded bg-[#3f8efc]/15 text-[#3f8efc] border border-[#3f8efc]/30">Recommended</span>
                            </div>
                            <div className="text-xs text-zinc-500 mt-0.5">With embedded screenshots and annotations</div>
                          </div>
                        </button>
                        <div className="border-t border-zinc-800/70 mx-3" />
                        <button role="menuitem" onClick={() => { setShowExportMenu(false); exportXLSX(); }} className="w-full px-3 py-3 text-left hover:bg-zinc-800 flex items-start gap-3 transition">
                          <Download size={16} className="text-zinc-400 mt-0.5 flex-shrink-0" />
                          <div className="flex-1 min-w-0">
                            <div className="text-sm font-semibold text-zinc-100">XLSX</div>
                            <div className="text-xs text-zinc-500 mt-0.5">Spreadsheet with embedded thumbnails</div>
                          </div>
                        </button>
                        <div className="border-t border-zinc-800/70 mx-3" />
                        <button role="menuitem" onClick={() => { setShowExportMenu(false); exportCSV(); }} className="w-full px-3 py-3 text-left hover:bg-zinc-800 flex items-start gap-3 transition">
                          <Download size={16} className="text-zinc-400 mt-0.5 flex-shrink-0" />
                          <div className="flex-1 min-w-0">
                            <div className="text-sm font-semibold text-zinc-100">CSV</div>
                            <div className="text-xs text-zinc-500 mt-0.5">Use this if your images are hosted elsewhere and linked here (e.g. Google Drive)</div>
                          </div>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              {!authorName.trim() && !authorNudgeDismissed && (
                <div className="bg-[#2563eb] px-4 md:px-5 py-2.5 flex flex-col md:flex-row md:items-center gap-2 md:gap-3 flex-shrink-0">
                  <span className="text-sm text-white font-medium md:flex-shrink-0">Add your name to attribute this report:</span>
                  <div className="flex items-center gap-2 md:gap-3 md:flex-1 md:contents">
                    <input
                      type="text"
                      placeholder="Your name"
                      autoFocus
                      value={nameNudgeDraft}
                      onChange={(e) => { let v = e.target.value; if (v.length > 0) v = v.charAt(0).toUpperCase() + v.slice(1); setNameNudgeDraft(v); }}
                      onKeyDown={(e) => { if (e.key === 'Enter' && nameNudgeDraft.trim()) setAuthorName(nameNudgeDraft.trim()); }}
                      onBlur={() => { if (nameNudgeDraft.trim()) setAuthorName(nameNudgeDraft.trim()); }}
                      className="flex-1 md:flex-initial md:max-w-xs text-sm bg-white/15 text-white border border-white/25 rounded px-2.5 py-1 outline-none focus:bg-white/20 focus:border-white/60 focus:ring-2 focus:ring-white/30 placeholder:text-white/60 transition"
                    />
                    <span className="text-xs text-white/75 hidden md:inline whitespace-nowrap">Press Enter to save</span>
                    <button onClick={() => setAuthorNudgeDismissed(true)} className="text-xs text-white/80 hover:text-white px-2 py-1 rounded hover:bg-white/15 transition flex-shrink-0">Skip</button>
                  </div>
                </div>
              )}
              <iframe title="Report Preview" srcDoc={previewHtml} className="flex-1 w-full bg-zinc-950 border-0" />
            </div>
          )}

          {/* Sidebar */}
          <div className={`mobile-sidebar-transition fixed md:relative inset-y-0 left-0 z-40 w-64 bg-zinc-950 border-r border-zinc-900 flex flex-col flex-shrink-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0`}>
            <div className="px-4 py-3 border-b border-zinc-900 flex items-center justify-between">
              <h1 className="text-base font-bold text-zinc-100">Feedback Compiler</h1>
              <div className="relative" ref={menuRef}>
                  <button onClick={() => setShowMenu(!showMenu)} aria-label="More options" className="group relative p-1 rounded text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900 transition">
                    <MoreHorizontal size={16} />
                    {!showMenu && (
                      <Tooltip anchor="right">More options</Tooltip>
                    )}
                  </button>
                  {showMenu && (
                    <div className="absolute right-0 top-full mt-1 w-60 bg-zinc-900 border border-zinc-800 rounded shadow-2xl z-30 py-1">
                      <div className="px-3 py-2">
                        <div className="text-[10px] text-zinc-500 uppercase tracking-wider mb-1.5">Your name</div>
                        <input
                          type="text"
                          value={authorName}
                          onChange={(e) => { let v = e.target.value; if (v.length > 0) v = v.charAt(0).toUpperCase() + v.slice(1); setAuthorName(v); }}
                          placeholder="e.g. Alex"
                          className="w-full text-sm bg-zinc-950 text-zinc-100 border border-zinc-800 rounded px-2 py-1.5 outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500/30 placeholder:text-zinc-600 transition"
                        />
                        <div className="text-[10px] text-zinc-600 mt-1.5 leading-snug">Shown on exported reports.</div>
                      </div>
                      <div className="my-1 border-t border-zinc-800" />
                      <button onClick={exportSession} disabled={feedbacks.length === 0} className="w-full px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition"><FolderDown size={14} className="text-zinc-400" />Export session (.json)</button>
                      <button onClick={() => importFileRef.current?.click()} className="w-full px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800 flex items-center gap-2 transition"><FolderUp size={14} className="text-zinc-400" />Import session (.json)</button>
                      <div className="my-1 border-t border-zinc-800" />
                      <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="w-full px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800 flex items-center gap-2 transition">
                        {theme === 'dark' ? <Sun size={14} className="text-zinc-400" /> : <Moon size={14} className="text-zinc-400" />}
                        {theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
                      </button>
                      <div className="my-1 border-t border-zinc-800" />
                      <button onClick={clearAllData} disabled={feedbacks.length === 0} className="w-full px-3 py-2 text-left text-sm text-red-400 hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition"><Trash size={14} />Clear all data</button>
                      <div className="px-3 pt-2 pb-1 text-[10px] text-zinc-600 border-t border-zinc-800 mt-1">Auto-saved in this browser</div>
                    </div>
                  )}
                  <input ref={importFileRef} type="file" accept="application/json" onChange={handleImportSession} className="hidden" />
                </div>
            </div>

            <div className="flex-1 overflow-y-auto p-3">
              <button onClick={() => { createFeedback(); setSidebarOpen(false); }} className="w-full bg-zinc-100 hover:bg-white text-zinc-900 py-2.5 rounded font-semibold text-sm flex items-center justify-center gap-2 transition mb-3 shadow-lg"><Plus size={16} />New Feedback</button>
              {feedbacks.length === 0 ? (
                <div className="text-center py-8 text-zinc-600 text-sm"><MessageSquare size={32} className="mx-auto mb-2 opacity-40" />No feedback yet</div>
              ) : (
                <>
                  <div className="space-y-0.5">
                    {feedbacks.map((fb, idx) => {
                      const isActive = activeFeedbackId === fb.id;
                      const isEditingTitle = editingTitleId === fb.id;
                      return (
                        <div key={fb.id} onClick={() => { if (isEditingTitle) return; setActiveFeedbackId(fb.id); setActiveMediaId(fb.media[0]?.id || null); setSidebarOpen(false); }} className={`group relative pl-3 pr-2 py-2.5 rounded ${isEditingTitle ? '' : 'cursor-pointer'} transition ${isActive ? 'bg-[#3f8efc]/10 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/40'}`}>
                          {isActive && <div className="absolute left-0 top-2 bottom-2 w-[3px] bg-[#3f8efc] rounded-r shadow-[0_0_8px_rgba(63,142,252,0.6)]" />}
                          <div className="flex items-center justify-between gap-2">
                            <div className="flex items-center gap-2 min-w-0 flex-1">
                              <span className={`text-[11px] font-mono flex-shrink-0 ${isActive ? 'text-[#3f8efc]' : 'text-[#3f8efc]/60'}`}>{String(idx + 1).padStart(2, '0')}</span>
                              {isEditingTitle ? (
                                <input
                                  autoFocus
                                  value={editingTitleValue}
                                  onChange={(e) => { let v = applySmartReplace(e); if (v.length > 0) v = v.charAt(0).toUpperCase() + v.slice(1); setEditingTitleValue(v); }}
                                  onKeyDown={(e) => {
                                    if (e.key === 'Enter') { e.preventDefault(); commitTitleEdit(); }
                                    else if (e.key === 'Escape') { e.preventDefault(); cancelTitleEdit(); }
                                  }}
                                  onBlur={commitTitleEdit}
                                  onClick={(e) => e.stopPropagation()}
                                  onFocus={(e) => e.target.select()}
                                  className="flex-1 min-w-0 text-sm bg-zinc-950 border border-zinc-700 text-zinc-100 rounded px-1.5 py-0.5 outline-none focus:border-zinc-400 focus:ring-1 focus:ring-zinc-400/30"
                                />
                              ) : (
                                <div
                                  onDoubleClick={(e) => { e.stopPropagation(); startTitleEdit(fb.id, fb.title); }}
                                  title="Double-click to rename"
                                  className={`text-sm truncate flex-1 select-none ${isActive ? 'font-semibold' : 'font-medium'} ${!fb.title?.trim() ? 'italic text-zinc-600' : ''}`}
                                >
                                  {displayTitle(fb)}
                                </div>
                              )}

                      )}
                    </span>
                    {bottomCollapsed ? <ChevronUp size={12} className="flex-shrink-0" /> : <ChevronDown size={12} className="flex-shrink-0" />}
                  </button>
                  {!bottomCollapsed && (
                    <div className="px-4 pb-3">
                      <div className="max-w-4xl mx-auto">
                        <div className="relative mb-1.5 group">
                          <input
                            ref={titleInputRef}
                            type="text"
                            value={activeFeedback.title}
                            onChange={(e) => { let v = applySmartReplace(e); if (v.length > 0) v = v.charAt(0).toUpperCase() + v.slice(1); updateFeedback(activeFeedback.id, { title: v }); setHighlightedSuggestion(-1); setShowTitleSuggestions(true); }}
                            onFocus={() => { setShowTitleSuggestions(true); setHighlightedSuggestion(-1); }}
                            onBlur={() => { setShowTitleSuggestions(false); setHighlightedSuggestion(-1); }}
                            onKeyDown={(e) => {
                              const hasSuggestions = showTitleSuggestions && titleSuggestions.length > 0;
                              if (e.key === 'ArrowDown' && hasSuggestions) {
                                e.preventDefault();
                                setHighlightedSuggestion(i => i < titleSuggestions.length - 1 ? i + 1 : 0);
                              } else if (e.key === 'ArrowUp' && hasSuggestions) {
                                e.preventDefault();
                                setHighlightedSuggestion(i => i > 0 ? i - 1 : titleSuggestions.length - 1);
                              } else if (e.key === 'Escape' && showTitleSuggestions) {
                                e.preventDefault();
                                setShowTitleSuggestions(false);
                                setHighlightedSuggestion(-1);
                              } else if (e.key === 'Enter') {
                                e.preventDefault();
                                if (hasSuggestions && highlightedSuggestion >= 0) {
                                  updateFeedback(activeFeedback.id, { title: titleSuggestions[highlightedSuggestion] });
                                  setShowTitleSuggestions(false);
                                  setHighlightedSuggestion(-1);
                                } else {
                                  setShowTitleSuggestions(false);
                                  overallNoteRef.current?.focus();
                                }
                              }
                            }}
                            autoCapitalize="sentences"
                            autoComplete="off"
                            className="text-base font-bold text-zinc-100 bg-zinc-950/50 border border-zinc-800 outline-none w-full hover:border-zinc-700 hover:bg-zinc-950 focus:bg-zinc-950 focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 pl-3 pr-9 py-1.5 rounded transition cursor-text"
                            placeholder="Page, feature or module name"
                            title="Click to edit title"
                          />
                          {showTitleSuggestions && titleSuggestions.length > 0 && (
                            <div className="absolute bottom-full left-0 right-0 mb-1 bg-zinc-900 border border-zinc-800 rounded shadow-2xl z-30 py-1 max-h-60 overflow-y-auto">
                              <div className="px-3 pt-1 pb-1 text-[10px] uppercase tracking-wider text-zinc-600">Recent titles</div>
                              {titleSuggestions.map((title, i) => (
                                <button
                                  key={title}
                                  type="button"
                                  // preventDefault on mousedown keeps focus on the input so blur doesn't
                                  // close the dropdown before the click handler runs.
                                  onMouseDown={(e) => e.preventDefault()}
                                  onMouseEnter={() => setHighlightedSuggestion(i)}
                                  onClick={() => {
                                    updateFeedback(activeFeedback.id, { title });
                                    setShowTitleSuggestions(false);
                                    setHighlightedSuggestion(-1);
                                    titleInputRef.current?.focus();
                                  }}
                                  className={`w-full px-3 py-1.5 text-left text-sm truncate transition ${highlightedSuggestion === i ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-300 hover:bg-zinc-800/50'}`}
                                >
                                  {title}
                                </button>
                              ))}
                            </div>
                          )}
                          <Edit3 size={12} className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 group-hover:text-zinc-400 transition pointer-events-none group-focus-within:hidden" />
                          {activeFeedback.title && (
                            <button type="button" onMouseDown={(e) => { e.preventDefault(); updateFeedback(activeFeedback.id, { title: '' }); }} className="hidden group-focus-within:flex absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded-full transition" title="Clear title"><X size={12} /></button>
                          )}
                        </div>
                        <textarea ref={overallNoteRef} value={activeFeedback.overallNote} onChange={(e) => updateFeedback(activeFeedback.id, { overallNote: applySmartReplace(e) })} placeholder="Overall feedback — summary, context, or issues..." className="w-full text-sm text-zinc-200 bg-zinc-950 border border-zinc-800 rounded px-3 py-2 outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-400/20 transition resize-none placeholder:text-zinc-600" rows={4} />
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}

            <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleFileUpload} className="hidden" />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FeedbackPlatform />);
  </script>
</body>
</html>
